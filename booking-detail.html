<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Cita | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a; --bg-card: #111111; --bg-elevated: #1a1a1a; --bg-input: #0f0f0f;
            --red: #dc2626; --red-hover: #b91c1c; --text-primary: #ffffff;
            --text-secondary: #a3a3a3; --text-muted: #6b7280; --border: #262626; --border-light: #333333;
            --radius-sm: 6px; --radius: 10px; --radius-lg: 16px; --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .back-link:hover { color: var(--text-secondary); }
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .page-header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .status-badge { padding: 0.4rem 1rem; border-radius: 50px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .status-pending { background: rgba(245,158,11,0.12); color: #fbbf24; }
        .status-confirmed { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .status-in_progress { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .status-completed { background: rgba(34,197,94,0.12); color: #4ade80; }
        .status-cancelled { background: rgba(239,68,68,0.12); color: #f87171; }
        .info-card, .section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .info-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
        .info-item .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 0.25rem; }
        .info-item .value { font-weight: 600; font-size: 0.95rem; }
        .info-item input, .info-item select { padding: 0.4rem 0.6rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-size: 0.85rem; outline: none; width: 100%; font-family: inherit; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
        .section-header h2 { font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 700; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; font-size: 0.82rem; font-family: inherit; transition: var(--transition); white-space: nowrap; }
        .btn-primary { background: var(--red); color: white; } .btn-primary:hover { background: var(--red-hover); }
        .btn-success { background: #16a34a; color: white; } .btn-success:hover { background: #15803d; }
        .btn-danger { background: #dc2626; color: white; } .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.7rem; }
        .note-list { display: grid; gap: 0.5rem; }
        .note-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; display: flex; justify-content: space-between; gap: 0.5rem; font-size: 0.85rem; }
        .note-item .note-time { color: var(--text-muted); font-size: 0.7rem; white-space: nowrap; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }
        .loading-state { text-align: center; padding: 2rem; color: var(--text-muted); }
        .wo-list { display: grid; gap: 0.5rem; }
        .wo-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.85rem 1.1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .wo-item:hover { border-color: var(--border-light); }
        .wo-actions { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
        .success-toast { position: fixed; bottom: 2rem; right: 2rem; background: #166534; color: #bbf7d0; padding: 0.75rem 1.25rem; border-radius: var(--radius); font-weight: 500; font-size: 0.85rem; display: none; z-index: 9999; border: 1px solid #22c55e; }

        @media (max-width: 768px) { body { padding: 1rem; } .info-grid { grid-template-columns: 1fr; } .wo-item { flex-direction: column; align-items: flex-start; } .wo-actions { width: 100%; justify-content: flex-end; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="back-link">Volver al panel</a>
        <div class="page-header"><h1 id="pageTitle">Cargando cita...</h1><span class="status-badge" id="pageStatus"></span></div>
        
        <div class="info-card"><div class="info-grid" id="infoGrid"><div class="loading-state">Cargando informacion...</div></div></div>
        
        <div class="section-card">
            <div class="section-header"><h2>Notas de la Cita</h2><button class="btn btn-primary btn-sm" onclick="addNote()">Agregar nota</button></div>
            <div id="notesContainer"><div class="loading-state">Cargando notas...</div></div>
        </div>
        
        <div class="section-card">
            <div class="section-header"><h2>Expedientes de Trabajo</h2><button class="btn btn-success btn-sm" onclick="createWorkOrder()">Iniciar Trabajo</button></div>
            <div id="workOrdersContainer"><div class="loading-state">Cargando expedientes...</div></div>
        </div>
    </div>
    <div class="success-toast" id="successMsg">Cambios guardados</div>

    <script>
        (function() {
            var SUPABASE_URL = 'https://pupfxetbnpgqikzhnjts.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cGZ4ZXRibnBncWlremhuanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTAwNzIsImV4cCI6MjA5OTcyNjA3Mn0.FVhkHQflNJRQbheadgL6RmzYuNbCezB3vIeaJHGS88M';
            var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            var bookingId = null;
            var booking = null;

            function showSuccess() { var msg = document.getElementById('successMsg'); msg.style.display = 'block'; setTimeout(function() { msg.style.display = 'none'; }, 2500); }
            function getBookingIdFromURL() { var params = new URLSearchParams(window.location.search); return params.get('id'); }

            async function init() {
                bookingId = getBookingIdFromURL();
                if (!bookingId) { window.location.href = '/admin'; return; }
                var sessionResult = await supabase.auth.getSession();
                if (!sessionResult.data || !sessionResult.data.session) { window.location.href = '/admin'; return; }
                await loadBooking();
            }

            async function loadBooking() {
                var result = await supabase.from('bookings').select('*').eq('id', bookingId).single();
                if (result.error || !result.data) { window.location.href = '/admin'; return; }
                booking = result.data;
                renderBooking();
                loadNotes();
                loadWorkOrders();
            }

            function renderBooking() {
                var statusMap = { pending:{text:'Pendiente',cls:'status-pending'}, confirmed:{text:'Confirmada',cls:'status-confirmed'}, en_taller:{text:'En Taller',cls:'status-in_progress'}, cancelled:{text:'Cancelada',cls:'status-cancelled'} };
                var st = statusMap[booking.status] || statusMap.pending;
                document.getElementById('pageTitle').textContent = 'Cita #' + booking.id + ' - ' + (booking.plate_number || 'Sin placa');
                document.getElementById('pageStatus').textContent = st.text; document.getElementById('pageStatus').className = 'status-badge ' + st.cls;
                var dateStr = booking.preferred_date ? new Date(booking.preferred_date+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : 'Sin fecha';
                var html = '';
                html += '<div class="info-item"><div class="label">Cliente</div><div class="value">'+booking.client_name+'</div></div>';
                html += '<div class="info-item"><div class="label">Telefono</div><div class="value">'+booking.phone+'</div></div>';
                html += '<div class="info-item"><div class="label">Email</div><div class="value">'+(booking.email||'No registrado')+'</div></div>';
                html += '<div class="info-item"><div class="label">Placa</div><div class="value" style="font-family:monospace;">'+(booking.plate_number||'Sin placa')+'</div></div>';
                html += '<div class="info-item"><div class="label">Vehiculo</div><div class="value">'+booking.vehicle+'</div></div>';
                html += '<div class="info-item"><div class="label">Servicio</div><div class="value">'+booking.service_requested+'</div></div>';
                html += '<div class="info-item"><div class="label">Fecha</div><div class="value">'+dateStr+'</div></div>';
                html += '<div class="info-item"><div class="label">Hora</div><div class="value">'+(booking.preferred_time||'No especificada')+'</div></div>';
                html += '<div class="info-item"><div class="label">Cambiar Estado</div><div class="value"><select onchange="updateStatus(this.value)"><option value="pending"'+(booking.status==='pending'?' selected':'')+'>Pendiente</option><option value="confirmed"'+(booking.status==='confirmed'?' selected':'')+'>Confirmar</option><option value="cancelled"'+(booking.status==='cancelled'?' selected':'')+'>Cancelar</option></select></div></div>';
                html += '<div class="info-item"><div class="label">Editar Placa</div><div class="value"><input type="text" value="'+(booking.plate_number||'')+'" onchange="updatePlate(this.value)" style="font-family:monospace;text-transform:uppercase;"></div></div>';
                document.getElementById('infoGrid').innerHTML = html;
            }

            function loadNotes() {
                var notes = booking.notes || []; if (typeof notes === 'string') notes = JSON.parse(notes);
                var container = document.getElementById('notesContainer');
                if (notes.length === 0) { container.innerHTML = '<div class="empty-state">Sin notas</div>'; return; }
                var html = '<div class="note-list">';
                for (var i = notes.length-1; i >= 0; i--) { html += '<div class="note-item"><span>'+notes[i].text+'</span><span class="note-time">'+new Date(notes[i].time).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+'</span></div>'; }
                html += '</div>'; container.innerHTML = html;
            }

            async function addNote() {
                var note = prompt('Agregar nota:'); if (!note || !note.trim()) return;
                var notes = booking.notes || []; if (typeof notes === 'string') notes = JSON.parse(notes);
                notes.push({text:note.trim(),time:new Date().toISOString()});
                await supabase.from('bookings').update({notes:notes}).eq('id',bookingId);
                booking.notes = notes; loadNotes(); showSuccess();
            }

            async function loadWorkOrders() {
                var container = document.getElementById('workOrdersContainer');
                var result = await supabase.from('work_orders').select('*').eq('booking_id',bookingId).order('created_at',{ascending:false});
                if (!result.data || result.data.length===0) { container.innerHTML = '<div class="empty-state">Sin expedientes de trabajo</div>'; return; }
                var html = '<div class="wo-list">';
                for (var i=0; i<result.data.length; i++) {
                    var wo = result.data[i];
                    var statusMap = { en_progreso:{text:'En Progreso',cls:'status-in_progress'}, completado:{text:'Completado',cls:'status-completed'}, entregado:{text:'Entregado',cls:'status-completed'} };
                    var st = statusMap[wo.status] || statusMap.en_progreso;
                    html += '<div class="wo-item">';
                    html += '<div><strong>Expediente #'+wo.id+'</strong> <span style="color:var(--text-muted);font-size:0.75rem;">'+new Date(wo.created_at).toLocaleDateString('es-MX')+'</span></div>';
                    html += '<div class="wo-actions">';
                    html += '<span class="status-badge '+st.cls+'">'+st.text+'</span>';
                    html += '<a href="/work-detail?id='+wo.id+'" class="btn btn-primary btn-sm" style="text-decoration:none;">Abrir</a>';
                    html += '<button class="btn btn-danger btn-sm" onclick="deleteWorkOrder('+wo.id+')">Eliminar</button>';
                    html += '</div></div>';
                }
                html += '</div>'; container.innerHTML = html;
            }

            async function createWorkOrder() {
                if (!booking.plate_number) { alert('Asigne una placa primero'); return; }
                var existingResult = await supabase.from('work_orders').select('*').eq('booking_id', parseInt(bookingId)).eq('status', 'en_progreso');
                if (existingResult.data && existingResult.data.length > 0) {
                    var woList = '';
                    for (var i = 0; i < existingResult.data.length; i++) {
                        woList += 'Expediente #' + existingResult.data[i].id + ' (' + new Date(existingResult.data[i].created_at).toLocaleDateString('es-MX') + ')\n';
                    }
                    var createNew = confirm('Ya existen expedientes en progreso para esta cita:\n\n' + woList + '\nDesea crear un nuevo expediente de todas formas?');
                    if (!createNew) return;
                }
                var result = await supabase.from('work_orders').insert([{booking_id: parseInt(bookingId), plate_number: booking.plate_number, vehicle: booking.vehicle, client_name: booking.client_name, phone: booking.phone, status: 'en_progreso'}]).select();
                if (result.error) { alert('Error al crear expediente'); return; }
                await supabase.from('bookings').update({status: 'en_taller'}).eq('id', bookingId);
                window.location.href = '/work-detail?id=' + result.data[0].id;
            }

            function deleteWorkOrder(woId) {
                var password = prompt('Ingrese la contrasena de administrador para eliminar este expediente:');
                if (!password) return;
                if (password !== 'mant1215') { alert('Contrasena incorrecta'); return; }
                if (!confirm('Esta seguro de eliminar este expediente? Esta accion no se puede deshacer.')) return;
                supabase.from('work_orders').delete().eq('id', woId).then(function() { loadWorkOrders(); showSuccess(); });
            }

            async function updateStatus(s) { await supabase.from('bookings').update({status:s}).eq('id',bookingId); booking.status = s; renderBooking(); showSuccess(); }
            async function updatePlate(p) { await supabase.from('bookings').update({plate_number:p.toUpperCase()}).eq('id',bookingId); booking.plate_number = p.toUpperCase(); showSuccess(); }

            window.addNote = addNote;
            window.createWorkOrder = createWorkOrder;
            window.deleteWorkOrder = deleteWorkOrder;
            window.updateStatus = updateStatus;
            window.updatePlate = updatePlate;
            init();
        })();
    </script>
</body>
</html>
