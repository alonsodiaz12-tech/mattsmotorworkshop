<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Cita | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-elevated: #1a1a1a;
            --bg-input: #0f0f0f;
            --red: #dc2626;
            --red-hover: #b91c1c;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #6b7280;
            --border: #262626;
            --border-light: #333333;
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            min-height: 100vh; padding: 2rem; -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; margin-bottom: 1.5rem; transition: var(--transition); }
        .back-link:hover { color: var(--text-secondary); }
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .page-header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .status-badge { padding: 0.4rem 1rem; border-radius: 50px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pending { background: rgba(245,158,11,0.12); color: #fbbf24; }
        .status-confirmed { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .status-in_progress { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .status-completed { background: rgba(34,197,94,0.12); color: #4ade80; }
        .status-cancelled { background: rgba(239,68,68,0.12); color: #f87171; }
        .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .info-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
        .info-item .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 0.25rem; }
        .info-item .value { font-weight: 600; font-size: 0.95rem; }
        .info-item input, .info-item select { padding: 0.4rem 0.6rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-size: 0.85rem; outline: none; width: 100%; font-family: inherit; }
        .info-item select { cursor: pointer; }
        .section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
        .section-header h2 { font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 700; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; font-size: 0.82rem; font-family: inherit; transition: var(--transition); }
        .btn-primary { background: var(--red); color: white; } .btn-primary:hover { background: var(--red-hover); }
        .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); } .btn-secondary:hover { border-color: var(--border-light); color: var(--text-primary); }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.7rem; }
        .btn-danger { background: #dc2626; color: white; } .btn-danger:hover { background: #b91c1c; }
        .btn-edit { background: #4b5563; color: white; } .btn-edit:hover { background: #6b7280; }
        .note-list { display: grid; gap: 0.5rem; }
        .note-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; display: flex; justify-content: space-between; gap: 0.5rem; font-size: 0.85rem; }
        .note-item .note-time { color: var(--text-muted); font-size: 0.7rem; white-space: nowrap; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }
        .loading-state { text-align: center; padding: 2rem; color: var(--text-muted); }
        .success-toast { position: fixed; bottom: 2rem; right: 2rem; background: #166534; color: #bbf7d0; padding: 0.75rem 1.25rem; border-radius: var(--radius); font-weight: 500; font-size: 0.85rem; display: none; z-index: 9999; border: 1px solid #22c55e; }

        /* Worklog */
        .worklog-grid { display: grid; gap: 0.5rem; }
        .worklog-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
        .worklog-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; cursor: pointer; transition: var(--transition); user-select: none; }
        .worklog-header-bar:hover { background: rgba(255,255,255,0.02); }
        .worklog-header-bar .wl-title { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); flex: 1; margin-right: 0.5rem; }
        .worklog-header-bar .wl-badges { display: flex; gap: 0.3rem; flex-shrink: 0; margin-right: 0.5rem; }
        .worklog-header-bar .wl-actions { display: flex; gap: 0.25rem; flex-shrink: 0; margin-right: 0.5rem; }
        .worklog-header-bar .wl-arrow { color: var(--text-muted); font-size: 0.65rem; transition: var(--transition); flex-shrink: 0; }
        .worklog-item.open .worklog-header-bar .wl-arrow { transform: rotate(180deg); }
        .badge { padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.65rem; font-weight: 500; white-space: nowrap; }
        .badge-time { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .badge-price { background: rgba(34,197,94,0.12); color: #4ade80; font-weight: 600; }
        .worklog-body { display: none; padding: 0 1rem 1rem 1rem; }
        .worklog-item.open .worklog-body { display: block; }
        .worklog-body .wl-date { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .worklog-body .wl-meta { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.3rem; }
        .worklog-body img { width: 100%; max-width: 100%; border-radius: var(--radius-sm); margin-top: 0.5rem; display: block; }

        /* Edit form */
        .edit-worklog-form { display: none; padding: 0 1rem 1rem 1rem; }
        .edit-worklog-form textarea { width: 100%; padding: 0.5rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.85rem; font-family: inherit; outline: none; resize: vertical; min-height: 50px; margin-bottom: 0.5rem; }
        .edit-worklog-form .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
        .edit-worklog-form .form-row input { padding: 0.4rem 0.5rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.8rem; font-family: inherit; outline: none; width: 65px; text-align: center; }
        .edit-worklog-form .form-row label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .edit-worklog-form .form-actions { display: flex; gap: 0.5rem; }

        .add-worklog-form, .add-part-form { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1.25rem; margin-top: 1rem; display: none; }
        .add-worklog-form textarea, .add-part-form textarea, .add-part-form input[type="text"] { width: 100%; padding: 0.7rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.85rem; font-family: inherit; outline: none; resize: vertical; min-height: 40px; margin-bottom: 0.75rem; }
        .add-part-form .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
        .add-part-form .form-row label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); white-space: nowrap; }
        .add-part-form .form-row input[type="file"] { flex: 1; padding: 0.4rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.8rem; }
        .add-part-form .form-actions, .add-worklog-form .form-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .add-worklog-form .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
        .add-worklog-form .form-row input { padding: 0.5rem 0.7rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.85rem; font-family: inherit; outline: none; }
        .add-worklog-form .form-row label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); white-space: nowrap; }
        .add-worklog-form .form-row .input-group { display: flex; align-items: center; gap: 0.25rem; }
        .add-worklog-form .form-row .input-group input { width: 60px; text-align: center; }

        /* Parts */
        .parts-grid { display: grid; gap: 0.75rem; }
        .part-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
        .part-card .part-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
        .part-card .part-header strong { font-size: 0.95rem; }
        .part-card .part-header .part-link { font-size: 0.7rem; color: var(--text-muted); }
        .part-card .part-photos { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .part-card .part-photo-item { text-align: center; }
        .part-card .part-photo-item .photo-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.3rem; }
        .part-card .part-photo-item img { width: 100%; max-width: 100%; border-radius: var(--radius-sm); display: block; }
        .part-card .part-photo-item .no-photo { padding: 2rem; background: var(--bg-dark); border-radius: var(--radius-sm); color: var(--text-muted); font-size: 0.75rem; }

        @media (max-width: 768px) { body { padding: 1rem; } .info-grid { grid-template-columns: 1fr; } .page-header { flex-direction: column; align-items: flex-start; } .part-card .part-photos { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="back-link">Volver al panel</a>
        <div class="page-header"><h1 id="pageTitle">Cargando cita...</h1><span class="status-badge" id="pageStatus"></span></div>
        <div class="info-card"><div class="info-grid" id="infoGrid"><div class="loading-state">Cargando informacion...</div></div></div>
        
        <div class="section-card"><div class="section-header"><h2>Notas del Taller</h2><button class="btn btn-primary btn-sm" onclick="addNote()">Agregar nota</button></div><div id="notesContainer"><div class="loading-state">Cargando notas...</div></div></div>
        
        <div class="section-card"><div class="section-header"><h2>Registro de Trabajos</h2><button class="btn btn-primary btn-sm" onclick="toggleWorklogForm()">Agregar trabajo</button></div><div id="worklogContainer"><div class="loading-state">Cargando trabajos...</div></div>
        <div class="add-worklog-form" id="worklogForm">
            <textarea id="worklogDesc" placeholder="Describa el trabajo realizado..."></textarea>
            <div class="form-row">
                <div class="input-group"><label>Horas</label><input type="number" id="worklogHours" value="0" min="0" max="99"></div>
                <div class="input-group"><label>Minutos</label><input type="number" id="worklogMinutes" value="0" min="0" max="59"></div>
                <div class="input-group" style="flex:1;"><label>Precio (CRC)</label><input type="number" id="worklogPrice" value="0" min="0" step="0.01" style="width:100px;"></div>
            </div>
            <div class="form-row"><label>Foto (opcional)</label><input type="file" id="worklogPhoto" accept="image/*" style="flex:1;"></div>
            <div class="form-actions"><button class="btn btn-primary" onclick="saveWorklog()">Guardar trabajo</button><button class="btn btn-secondary" onclick="toggleWorklogForm()">Cancelar</button></div>
        </div></div>
        
        <div class="section-card"><div class="section-header"><h2>Repuestos Reemplazados</h2><button class="btn btn-primary btn-sm" onclick="togglePartForm()">Agregar repuesto</button></div><div id="partsContainer"><div class="loading-state">Cargando repuestos...</div></div>
        <div class="add-part-form" id="partForm">
            <input type="text" id="partName" placeholder="Nombre del repuesto (ej: Filtro de aceite, Bateria, etc.)">
            <div class="form-row"><label>Vincular a trabajo (opcional)</label><select id="partWorklog" style="padding:0.5rem;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.85rem;font-family:inherit;flex:1;"><option value="">Sin vincular</option></select></div>
            <div class="form-row"><label>Foto repuesto ANTIGUO</label><input type="file" id="partOldPhoto" accept="image/*"></div>
            <div class="form-row"><label>Foto repuesto NUEVO</label><input type="file" id="partNewPhoto" accept="image/*"></div>
            <div class="form-actions"><button class="btn btn-primary" onclick="savePart()">Guardar repuesto</button><button class="btn btn-secondary" onclick="togglePartForm()">Cancelar</button></div>
        </div></div>
    </div>
    <div class="success-toast" id="successMsg">Cambios guardados</div>

    <script>
        (function() {
            var SUPABASE_URL = 'https://pupfxetbnpgqikzhnjts.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cGZ4ZXRibnBncWlremhuanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTAwNzIsImV4cCI6MjA5OTcyNjA3Mn0.FVhkHQflNJRQbheadgL6RmzYuNbCezB3vIeaJHGS88M';
            var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            var bookingId = null;
            var booking = null;

            function showSuccess() { var msg = document.getElementById('successMsg'); msg.style.display = 'block'; setTimeout(function() { msg.style.display = 'none'; }, 2500); }
            function getBookingIdFromURL() { var params = new URLSearchParams(window.location.search); return params.get('id'); }

            async function init() {
                bookingId = getBookingIdFromURL();
                if (!bookingId) { window.location.href = '/admin'; return; }
                var sessionResult = await supabase.auth.getSession();
                if (!sessionResult.data || !sessionResult.data.session) { window.location.href = '/admin'; return; }
                await loadBooking();
            }

            async function loadBooking() {
                var result = await supabase.from('bookings').select('*').eq('id', bookingId).single();
                if (result.error || !result.data) { window.location.href = '/admin'; return; }
                booking = result.data;
                renderBooking();
                loadNotes();
                loadWorkLogs();
                loadParts();
            }

            function renderBooking() {
                var statusMap = { pending:{text:'Pendiente',cls:'status-pending'}, confirmed:{text:'Confirmada',cls:'status-confirmed'}, en_taller:{text:'En Taller',cls:'status-in_progress'}, en_progreso:{text:'En Progreso',cls:'status-in_progress'}, completado:{text:'Completada',cls:'status-completed'}, entregado:{text:'Entregado',cls:'status-completed'}, cancelled:{text:'Cancelada',cls:'status-cancelled'} };
                var st = statusMap[booking.status] || statusMap.pending;
                document.getElementById('pageTitle').textContent = 'Cita #' + booking.id + ' - ' + (booking.plate_number || 'Sin placa');
                document.getElementById('pageStatus').textContent = st.text; document.getElementById('pageStatus').className = 'status-badge ' + st.cls;
                var dateStr = booking.preferred_date ? new Date(booking.preferred_date+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : 'Sin fecha';
                var html = '';
                html += '<div class="info-item"><div class="label">Cliente</div><div class="value">'+booking.client_name+'</div></div>';
                html += '<div class="info-item"><div class="label">Telefono</div><div class="value">'+booking.phone+'</div></div>';
                html += '<div class="info-item"><div class="label">Email</div><div class="value">'+(booking.email||'No registrado')+'</div></div>';
                html += '<div class="info-item"><div class="label">Placa</div><div class="value" style="font-family:monospace;letter-spacing:1px;">'+(booking.plate_number||'Sin placa')+'</div></div>';
                html += '<div class="info-item"><div class="label">Vehiculo</div><div class="value">'+booking.vehicle+'</div></div>';
                html += '<div class="info-item"><div class="label">Servicio</div><div class="value">'+booking.service_requested+'</div></div>';
                html += '<div class="info-item"><div class="label">Fecha</div><div class="value">'+dateStr+'</div></div>';
                html += '<div class="info-item"><div class="label">Hora</div><div class="value">'+(booking.preferred_time||'No especificada')+'</div></div>';
                html += '<div class="info-item"><div class="label">Descripcion</div><div class="value">'+(booking.problem_description||'Sin descripcion')+'</div></div>';
                html += '<div class="info-item"><div class="label">Cambiar Estado</div><div class="value"><select onchange="updateStatus(this.value)"><option value="pending"'+(booking.status==='pending'?' selected':'')+'>Pendiente</option><option value="confirmed"'+(booking.status==='confirmed'?' selected':'')+'>Confirmar</option><option value="en_taller"'+(booking.status==='en_taller'?' selected':'')+'>Ingreso al taller</option><option value="en_progreso"'+(booking.status==='en_progreso'?' selected':'')+'>En progreso</option><option value="completado"'+(booking.status==='completado'?' selected':'')+'>Completar</option><option value="entregado"'+(booking.status==='entregado'?' selected':'')+'>Entregado</option><option value="cancelled"'+(booking.status==='cancelled'?' selected':'')+'>Cancelar</option></select></div></div>';
                html += '<div class="info-item"><div class="label">Editar Placa</div><div class="value"><input type="text" value="'+(booking.plate_number||'')+'" onchange="updatePlate(this.value)" style="font-family:monospace;letter-spacing:1px;text-transform:uppercase;"></div></div>';
                html += '<div class="info-item"><div class="label">Entrega Estimada</div><div class="value"><input type="date" value="'+(booking.estimated_delivery||'')+'" onchange="updateEstimate(this.value)" style="color-scheme:dark;"></div></div>';
                document.getElementById('infoGrid').innerHTML = html;
            }

            function loadNotes() {
                var notes = booking.notes || []; if (typeof notes === 'string') notes = JSON.parse(notes);
                var container = document.getElementById('notesContainer');
                if (notes.length === 0) { container.innerHTML = '<div class="empty-state">Sin notas</div>'; return; }
                var html = '<div class="note-list">';
                for (var i = notes.length-1; i >= 0; i--) { html += '<div class="note-item"><span>'+notes[i].text+'</span><span class="note-time">'+new Date(notes[i].time).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+'</span></div>'; }
                html += '</div>'; container.innerHTML = html;
            }

            async function addNote() {
                var note = prompt('Agregar nota:'); if (!note || !note.trim()) return;
                var notes = booking.notes || []; if (typeof notes === 'string') notes = JSON.parse(notes);
                notes.push({text:note.trim(),time:new Date().toISOString()});
                await supabase.from('bookings').update({notes:notes}).eq('id',bookingId);
                booking.notes = notes; loadNotes(); showSuccess();
            }

            async function updateStatus(s) { await supabase.from('bookings').update({status:s}).eq('id',bookingId); booking.status = s; renderBooking(); showSuccess(); }
            async function updatePlate(p) { await supabase.from('bookings').update({plate_number:p.toUpperCase()}).eq('id',bookingId); booking.plate_number = p.toUpperCase(); showSuccess(); }
            async function updateEstimate(d) { await supabase.from('bookings').update({estimated_delivery:d}).eq('id',bookingId); booking.estimated_delivery = d; showSuccess(); }

            // ============ WORK LOGS ============
            async function loadWorkLogs() {
                var container = document.getElementById('worklogContainer');
                var result = await supabase.from('work_log').select('*').eq('booking_id',bookingId).order('created_at',{ascending:false});
                if (!result.data || result.data.length===0) { container.innerHTML = '<div class="empty-state">Sin registros de trabajo</div>'; return; }
                var html = '<div class="worklog-grid">';
                for (var i=0; i<result.data.length; i++) { 
                    var log = result.data[i];
                    var badgesHtml = '';
                    if (log.hours > 0 || log.minutes > 0) { var ts = ''; if (log.hours>0) ts+=log.hours+'h '; if (log.minutes>0) ts+=log.minutes+'min'; badgesHtml += '<span class="badge badge-time">'+ts.trim()+'</span>'; }
                    if (log.price > 0) { badgesHtml += '<span class="badge badge-price">'+parseFloat(log.price).toLocaleString('es-CR',{minimumFractionDigits:2,maximumFractionDigits:2})+' CRC</span>'; }
                    var detailHtml = '<div class="wl-date">'+new Date(log.created_at).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+'</div>';
                    if (log.hours>0||log.minutes>0) { var d='Duracion: '; if(log.hours>0)d+=log.hours+' hora'+(log.hours>1?'s':'')+' '; if(log.minutes>0)d+=(log.hours>0?'con ':'')+log.minutes+' minuto'+(log.minutes>1?'s':''); detailHtml+='<div class="wl-meta"><span>'+d+'</span></div>'; }
                    if (log.price>0) { detailHtml+='<div class="wl-meta"><span>Costo: <span class="wl-price">'+parseFloat(log.price).toLocaleString('es-CR',{minimumFractionDigits:2,maximumFractionDigits:2})+' CRC</span></span></div>'; }
                    if (log.photo_url) { detailHtml+='<img src="'+log.photo_url+'" onerror="this.style.display=\'none\'" loading="lazy">'; }
                    html += '<div class="worklog-item" id="worklog-'+log.id+'">';
                    html += '<div class="worklog-header-bar" onclick="toggleWorklog(this.parentElement)">';
                    html += '<span class="wl-title">'+log.description+'</span><span class="wl-badges">'+badgesHtml+'</span>';
                    html += '<span class="wl-actions" onclick="event.stopPropagation()"><button class="btn btn-edit btn-sm" onclick="showEditForm('+log.id+')">Editar</button><button class="btn btn-danger btn-sm" onclick="deleteWorklog('+log.id+')">Eliminar</button></span>';
                    html += '<span class="wl-arrow">&#9660;</span></div>';
                    html += '<div class="worklog-body">'+detailHtml+'</div>';
                    html += '<div class="edit-worklog-form" id="editForm-'+log.id+'"><textarea id="editDesc-'+log.id+'">'+log.description+'</textarea><div class="form-row"><label>Horas</label><input type="number" id="editHours-'+log.id+'" value="'+(log.hours||0)+'" min="0"><label>Minutos</label><input type="number" id="editMinutes-'+log.id+'" value="'+(log.minutes||0)+'" min="0" max="59"><label>Precio</label><input type="number" id="editPrice-'+log.id+'" value="'+(log.price||0)+'" min="0" step="0.01" style="width:90px;"></div><div class="form-actions"><button class="btn btn-primary btn-sm" onclick="saveEdit('+log.id+')">Guardar</button><button class="btn btn-secondary btn-sm" onclick="cancelEdit('+log.id+')">Cancelar</button></div></div>';
                    html += '</div>';
                }
                html += '</div>'; container.innerHTML = html;
                populateWorklogSelect();
            }

            function toggleWorklog(item) { if(item.classList.contains('open')){item.classList.remove('open')}else{item.classList.add('open')} }
            window.toggleWorklog = toggleWorklog;

            function showEditForm(logId) { var item = document.getElementById('worklog-'+logId); item.querySelector('.worklog-body').style.display='none'; document.getElementById('editForm-'+logId).style.display='block'; if(!item.classList.contains('open'))item.classList.add('open'); item.setAttribute('data-opened-by-edit','true'); }
            window.showEditForm = showEditForm;

            function cancelEdit(logId) { var item = document.getElementById('worklog-'+logId); document.getElementById('editForm-'+logId).style.display='none'; item.querySelector('.worklog-body').style.display='block'; if(item.getAttribute('data-opened-by-edit')==='true'){item.classList.remove('open');item.removeAttribute('data-opened-by-edit');} }
            window.cancelEdit = cancelEdit;

            async function saveEdit(logId) { var desc=document.getElementById('editDesc-'+logId).value.trim(); var h=parseInt(document.getElementById('editHours-'+logId).value)||0; var m=parseInt(document.getElementById('editMinutes-'+logId).value)||0; var p=parseFloat(document.getElementById('editPrice-'+logId).value)||0; if(!desc){alert('Descripcion obligatoria');return;} await supabase.from('work_log').update({description:desc,hours:h,minutes:m,price:p}).eq('id',logId); loadWorkLogs(); showSuccess(); }
            window.saveEdit = saveEdit;

            async function deleteWorklog(logId) { if(!confirm('Eliminar este trabajo?'))return; await supabase.from('work_log').delete().eq('id',logId); loadWorkLogs(); loadParts(); showSuccess(); }
            window.deleteWorklog = deleteWorklog;

            async function populateWorklogSelect() {
                var select = document.getElementById('partWorklog');
                var result = await supabase.from('work_log').select('id,description').eq('booking_id',bookingId).order('created_at',{ascending:false});
                var html = '<option value="">Sin vincular</option>';
                if(result.data) { for(var i=0;i<result.data.length;i++){ html+='<option value="'+result.data[i].id+'">'+result.data[i].description+'</option>'; } }
                select.innerHTML = html;
            }

            function toggleWorklogForm() { var f=document.getElementById('worklogForm'); f.style.display=f.style.display==='block'?'none':'block'; if(f.style.display==='block')document.getElementById('worklogDesc').focus(); }
            async function saveWorklog() {
                var desc=document.getElementById('worklogDesc').value.trim(); if(!desc){alert('Describa el trabajo');return;}
                var h=parseInt(document.getElementById('worklogHours').value)||0; var m=parseInt(document.getElementById('worklogMinutes').value)||0; var p=parseFloat(document.getElementById('worklogPrice').value)||0;
                var photoUrl=null; var fi=document.getElementById('worklogPhoto');
                if(fi.files&&fi.files[0]){var file=fi.files[0];var fn='booking-'+bookingId+'-'+Date.now()+'.'+file.name.split('.').pop();var up=await supabase.storage.from('workshop-photos').upload(fn,file); if(!up.error){var pu=supabase.storage.from('workshop-photos').getPublicUrl(fn);photoUrl=pu.data.publicUrl;}}
                await supabase.from('work_log').insert([{booking_id:parseInt(bookingId),description:desc,hours:h,minutes:m,price:p,photo_url:photoUrl}]);
                document.getElementById('worklogDesc').value=''; document.getElementById('worklogHours').value='0'; document.getElementById('worklogMinutes').value='0'; document.getElementById('worklogPrice').value='0'; document.getElementById('worklogPhoto').value='';
                toggleWorklogForm(); loadWorkLogs(); loadParts(); showSuccess();
            }

            // ============ PARTS ============
            async function loadParts() {
                var container = document.getElementById('partsContainer');
                var result = await supabase.from('replaced_parts').select('*,work_log(description)').eq('booking_id',bookingId).order('created_at',{ascending:false});
                if (!result.data || result.data.length===0) { container.innerHTML = '<div class="empty-state">Sin repuestos registrados</div>'; return; }
                var html = '<div class="parts-grid">';
                for (var i=0; i<result.data.length; i++) {
                    var part = result.data[i];
                    var workDesc = part.work_log ? part.work_log.description : null;
                    html += '<div class="part-card">';
                    html += '<div class="part-header"><strong>'+part.part_name+'</strong>';
                    if (workDesc) { html += '<span class="part-link">Trabajo: '+workDesc+'</span>'; }
                    html += '<button class="btn btn-danger btn-sm" onclick="deletePart('+part.id+')">Eliminar</button></div>';
                    html += '<div class="part-photos">';
                    html += '<div class="part-photo-item"><div class="photo-label">Repuesto Antiguo</div>';
                    html += part.old_part_photo ? '<img src="'+part.old_part_photo+'" onerror="this.style.display=\'none\'" loading="lazy">' : '<div class="no-photo">Sin foto</div>';
                    html += '</div>';
                    html += '<div class="part-photo-item"><div class="photo-label">Repuesto Nuevo</div>';
                    html += part.new_part_photo ? '<img src="'+part.new_part_photo+'" onerror="this.style.display=\'none\'" loading="lazy">' : '<div class="no-photo">Sin foto</div>';
                    html += '</div></div></div>';
                }
                html += '</div>'; container.innerHTML = html;
                populateWorklogSelect();
            }

            function togglePartForm() { var f=document.getElementById('partForm'); f.style.display=f.style.display==='block'?'none':'block'; if(f.style.display==='block'){populateWorklogSelect();document.getElementById('partName').focus();} }
            
            async function savePart() {
                var name = document.getElementById('partName').value.trim(); if (!name) { alert('Ingrese el nombre del repuesto'); return; }
                var wlId = document.getElementById('partWorklog').value || null;
                var oldPhoto = null, newPhoto = null;
                var oldFile = document.getElementById('partOldPhoto').files[0];
                var newFile = document.getElementById('partNewPhoto').files[0];
                if (oldFile) { var fn = 'part-old-' + bookingId + '-' + Date.now() + '.' + oldFile.name.split('.').pop(); var up = await supabase.storage.from('workshop-photos').upload(fn, oldFile); if (!up.error) { var pu = supabase.storage.from('workshop-photos').getPublicUrl(fn); oldPhoto = pu.data.publicUrl; } }
                if (newFile) { var fn = 'part-new-' + bookingId + '-' + Date.now() + '.' + newFile.name.split('.').pop(); var up = await supabase.storage.from('workshop-photos').upload(fn, newFile); if (!up.error) { var pu = supabase.storage.from('workshop-photos').getPublicUrl(fn); newPhoto = pu.data.publicUrl; } }
                
                await supabase.from('replaced_parts').insert([{booking_id: parseInt(bookingId), work_log_id: wlId ? parseInt(wlId) : null, part_name: name, old_part_photo: oldPhoto, new_part_photo: newPhoto}]);
                
                // Descontar del inventario si coincide
                var invResult = await supabase.from('inventory').select('*').or('name.ilike.' + name + ',barcode.eq.' + name + ',numeric_code.eq.' + name).single();
                if (invResult.data && invResult.data.stock > 0) {
                    await supabase.from('inventory').update({stock: invResult.data.stock - 1}).eq('id', invResult.data.id);
                    await supabase.from('inventory_movements').insert([{inventory_id: invResult.data.id, booking_id: parseInt(bookingId), movement_type: 'salida', quantity: 1, notes: 'Usado en repuesto: ' + name}]);
                }
                
                document.getElementById('partName').value = ''; document.getElementById('partWorklog').value = '';
                document.getElementById('partOldPhoto').value = ''; document.getElementById('partNewPhoto').value = '';
                togglePartForm(); loadParts(); showSuccess();
            }
            
            async function deletePart(partId) { if(!confirm('Eliminar este repuesto?'))return; await supabase.from('replaced_parts').delete().eq('id',partId); loadParts(); showSuccess(); }
            window.deletePart = deletePart;

            window.addNote = addNote; window.toggleWorklogForm = toggleWorklogForm; window.saveWorklog = saveWorklog;
            window.togglePartForm = togglePartForm; window.savePart = savePart;
            window.updateStatus = updateStatus; window.updatePlate = updatePlate; window.updateEstimate = updateEstimate;
            init();
        })();
    </script>
</body>
</html>
