<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Vehículo | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-elevated: #1a1a1a;
            --red: #dc2626;
            --red-light: #ef4444;
            --gold: #c9a84c;
            --gold-light: #e2c970;
            --green: #22c55e;
            --green-dark: #166534;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border: #262626;
            --border-light: #333333;
            --radius: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 30% 50%, rgba(220,38,38,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(59,130,246,0.04) 0%, transparent 50%);
        }

        .tracking-container { width: 100%; max-width: 750px; }
        .tracking-header { text-align: center; margin-bottom: 2rem; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition); margin-bottom: 1.5rem; }
        .back-link:hover { color: var(--red-light); }
        .tracking-header .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .tracking-header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .tracking-header p { color: var(--text-secondary); font-size: 1rem; line-height: 1.6; }
        .search-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2.5rem; }
        .search-form { display: grid; gap: 1.5rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 0.5rem; }
        .input-with-icon { position: relative; }
        .input-with-icon input { width: 100%; padding: 1rem 1.2rem 1rem 3rem; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1.1rem; font-family: 'Inter', sans-serif; outline: none; transition: var(--transition); letter-spacing: 1px; text-transform: uppercase; }
        .input-with-icon input:hover { border-color: var(--border-light); }
        .input-with-icon input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
        .input-with-icon .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: var(--text-muted); }
        .btn-search { width: 100%; padding: 1rem; background: var(--red); color: white; border: none; border-radius: 50px; font-weight: 600; font-size: 1rem; letter-spacing: 0.5px; cursor: pointer; transition: var(--transition); font-family: 'Inter', sans-serif; box-shadow: 0 8px 30px rgba(220,38,38,0.3); }
        .btn-search:hover { background: var(--red-light); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(220,38,38,0.45); }
        .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 1rem; border-radius: var(--radius); text-align: center; font-size: 0.9rem; display: none; }

        .result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2.5rem; margin-top: 1.5rem; display: none; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .result-vehicle h2 { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
        .result-vehicle .plate { display: inline-block; background: var(--bg-elevated); border: 1px solid var(--border-light); padding: 0.3rem 1rem; border-radius: 6px; font-family: 'Montserrat', monospace; font-weight: 700; font-size: 1rem; letter-spacing: 2px; color: var(--gold-light); }
        .status-badge { padding: 0.5rem 1.2rem; border-radius: 50px; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.5px; text-transform: uppercase; }
        .status-pending { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .status-confirmed { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .status-in_progress { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .status-completed { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .status-cancelled { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        .info-message { text-align: center; padding: 1.5rem; border-radius: var(--radius); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .info-pending { background: rgba(245,158,11,0.08); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .info-confirmed { background: rgba(59,130,246,0.08); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
        .info-success { background: rgba(34,197,94,0.08); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
        .info-cancelled { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

        .progress-tracker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 2rem; }
        .progress-step { text-align: center; }
        .progress-step .step-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-weight: 700; font-size: 0.9rem; background: var(--bg-elevated); border: 2px solid var(--border-light); color: var(--text-muted); transition: var(--transition); }
        .progress-step.completed .step-circle { background: var(--green-dark); border-color: var(--green); color: white; }
        .progress-step.active .step-circle { background: var(--blue); border-color: #60a5fa; color: white; animation: pulse-step 2s infinite; }
        @keyframes pulse-step { 0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,0.4)} 50%{box-shadow:0 0 0 12px rgba(59,130,246,0)} }
        .progress-step .step-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .progress-step.completed .step-label, .progress-step.active .step-label { color: var(--text-secondary); }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .detail-item { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
        .detail-item .detail-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 0.25rem; }
        .detail-item .detail-value { font-weight: 600; font-size: 0.95rem; }

        .notes-section { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; margin-top: 1rem; }
        .notes-section h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 0.75rem; }
        .notes-list { list-style: none; display: grid; gap: 0.75rem; }
        .notes-list li { display: flex; gap: 0.75rem; padding: 0.75rem; background: var(--bg-dark); border-radius: 8px; font-size: 0.9rem; color: var(--text-secondary); }
        .notes-list li .note-time { color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; min-width: 50px; }
        .no-notes { color: var(--text-muted); font-style: italic; font-size: 0.9rem; }
        .new-search-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-light); padding: 0.7rem 1.5rem; border-radius: 50px; text-decoration: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: var(--transition); margin-top: 1rem; }
        .new-search-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }

        .worklog-client-grid { display: grid; gap: 0.5rem; }
        .worklog-client-item { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-size: 0.85rem; }
        .worklog-client-item .wl-header { display: flex; justify-content: space-between; margin-bottom: 0.25rem; flex-wrap: wrap; gap: 0.5rem; }
        .worklog-client-item img { width: 100%; max-width: 100%; border-radius: 6px; margin-top: 0.5rem; display: block; }

        @media (max-width: 600px) {
            body { padding: 1rem; align-items: flex-start; padding-top: 2rem; }
            .search-card, .result-card { padding: 1.5rem; }
            .detail-grid { grid-template-columns: 1fr; }
            .progress-tracker { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .result-header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="tracking-container">
        <div class="tracking-header">
            <a href="/home" class="back-link">← Volver al taller</a>
            <div class="icon">🔍</div>
            <h1>Estado del Vehículo</h1>
            <p>Ingrese el número de placa de su vehículo para consultar el estado actual de su servicio.</p>
        </div>

        <div class="search-card" id="searchCard">
            <form class="search-form" onsubmit="searchVehicle(event)">
                <div class="form-group"><label>Número de Placa</label><div class="input-with-icon"><span class="input-icon">🚗</span><input type="text" id="plateInput" placeholder="ABC-1234" maxlength="10" required autofocus></div></div>
                <div class="error-message" id="errorMessage"></div>
                <button type="submit" class="btn-search" id="searchBtn">Consultar Estado</button>
            </form>
        </div>

        <div class="result-card" id="resultCard">
            <div class="result-header">
                <div class="result-vehicle"><h2 id="resultVehicle"></h2><span class="plate" id="resultPlate"></span></div>
                <span class="status-badge" id="resultStatus"></span>
            </div>
            <div id="dynamicContent"></div>
            <button class="new-search-btn" onclick="newSearch()">← Nueva consulta</button>
        </div>
    </div>

    <script>
        var SUPABASE_URL = 'https://pupfxetbnpgqikzhnjts.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cGZ4ZXRibnBncWlremhuanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTAwNzIsImV4cCI6MjA5OTcyNjA3Mn0.FVhkHQflNJRQbheadgL6RmzYuNbCezB3vIeaJHGS88M';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.documentElement.style.display = 'none';
        (async function() {
            try { var result = await supabase.from('site_settings').select('setting_value').eq('setting_key','maintenance_mode').single(); if (result.data && result.data.setting_value==='true') { window.location.replace('/maintenance'); return; } } catch(e) {}
            document.documentElement.style.display = '';
        })();

        async function searchVehicle(e) {
            e.preventDefault();
            var plate = document.getElementById('plateInput').value.trim().toUpperCase();
            var errorMsg = document.getElementById('errorMessage');
            var resultCard = document.getElementById('resultCard');
            var searchBtn = document.getElementById('searchBtn');
            if (!plate) { errorMsg.style.display='block'; errorMsg.textContent='Ingrese un número de placa válido.'; return; }
            searchBtn.disabled=true; searchBtn.textContent='Buscando...'; errorMsg.style.display='none'; resultCard.style.display='none';
            var result = await supabase.from('bookings').select('*').eq('plate_number',plate).order('created_at',{ascending:false}).limit(1);
            searchBtn.disabled=false; searchBtn.textContent='Consultar Estado';
            if (result.error) { errorMsg.style.display='block'; errorMsg.textContent='Error al consultar.'; return; }
            if (!result.data || result.data.length===0) { errorMsg.style.display='block'; errorMsg.textContent='No se encontró ningún vehículo con esa placa.'; return; }
            displayResult(result.data[0]);
        }

        function displayResult(booking) {
            var resultCard = document.getElementById('resultCard');
            var status = booking.status;
            var dynamicContent = document.getElementById('dynamicContent');
            document.getElementById('resultVehicle').textContent = booking.vehicle || 'No especificado';
            document.getElementById('resultPlate').textContent = booking.plate_number || 'N/A';
            var statusMap = {'pending':{text:'Pendiente',class:'status-pending'},'confirmed':{text:'Confirmada',class:'status-confirmed'},'en_taller':{text:'En Taller',class:'status-in_progress'},'en_progreso':{text:'En Progreso',class:'status-in_progress'},'completado':{text:'Completado',class:'status-completed'},'entregado':{text:'Entregado',class:'status-completed'},'cancelled':{text:'Cancelado',class:'status-cancelled'}};
            var st = statusMap[status] || statusMap.pending;
            var statusBadge = document.getElementById('resultStatus');
            statusBadge.textContent = st.text; statusBadge.className = 'status-badge ' + st.class;
            var html = '';

            if (status === 'pending') {
                html += '<div class="info-message info-pending">⏳ Su cita está <strong>pendiente de confirmación</strong>.</div>';
                html += '<div class="detail-grid"><div class="detail-item"><div class="detail-label">Servicio</div><div class="detail-value">'+(booking.service_requested||'')+'</div></div><div class="detail-item"><div class="detail-label">Fecha</div><div class="detail-value">'+(booking.preferred_date?new Date(booking.preferred_date+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'}):'')+'</div></div><div class="detail-item"><div class="detail-label">Hora</div><div class="detail-value">'+(booking.preferred_time||'')+'</div></div><div class="detail-item"><div class="detail-label">Cliente</div><div class="detail-value">'+(booking.client_name||'')+'</div></div></div>';
            } else if (status === 'confirmed') {
                var dateFormatted = booking.preferred_date ? new Date(booking.preferred_date+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : '';
                html += '<div class="info-message info-confirmed">✅ Su cita ha sido <strong>confirmada</strong>. Preséntese el <strong>'+dateFormatted+'</strong> a las <strong>'+(booking.preferred_time||'')+'</strong>.</div>';
                html += '<div class="detail-grid"><div class="detail-item"><div class="detail-label">Servicio</div><div class="detail-value">'+(booking.service_requested||'')+'</div></div><div class="detail-item"><div class="detail-label">Fecha</div><div class="detail-value">'+dateFormatted+'</div></div><div class="detail-item"><div class="detail-label">Hora</div><div class="detail-value">'+(booking.preferred_time||'')+'</div></div><div class="detail-item"><div class="detail-label">Cliente</div><div class="detail-value">'+(booking.client_name||'')+'</div></div></div>';
            } else if (status === 'en_taller' || status === 'en_progreso') {
                var progressOrder = ['en_taller','en_progreso','completado','entregado'];
                var currentIndex = progressOrder.indexOf(status); if (currentIndex < 0) currentIndex = 0;
                var steps = [{label:'En Taller',icon:'🔧'},{label:'En Progreso',icon:'⚙'},{label:'Completado',icon:'✓'},{label:'Entregado',icon:'🎉'}];
                html += '<div class="progress-tracker">';
                for (var i=0; i<steps.length; i++) { var cls = i<currentIndex?'completed':(i===currentIndex?'active':''); html += '<div class="progress-step '+cls+'"><div class="step-circle">'+(cls==='completed'?'✓':steps[i].icon)+'</div><div class="step-label">'+steps[i].label+'</div></div>'; }
                html += '</div>';
                html += '<div class="detail-grid"><div class="detail-item"><div class="detail-label">Servicio</div><div class="detail-value">'+(booking.service_requested||'')+'</div></div><div class="detail-item"><div class="detail-label">Ingreso</div><div class="detail-value">'+new Date(booking.created_at).toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'})+'</div></div><div class="detail-item"><div class="detail-label">Entrega Est.</div><div class="detail-value">'+(booking.estimated_delivery?new Date(booking.estimated_delivery+'T00:00:00').toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'}):'Por definir')+'</div></div><div class="detail-item"><div class="detail-label">Cliente</div><div class="detail-value">'+(booking.client_name||'')+'</div></div></div>';
                html += '<div class="notes-section"><h3>Notas del Taller</h3>';
                var notes = booking.notes || []; if (typeof notes==='string') notes = JSON.parse(notes);
                if (!notes || notes.length===0) { html += '<p class="no-notes">Sin notas.</p>'; } else { html += '<ul class="notes-list">'; for (var n=0; n<notes.length; n++) { html += '<li><span class="note-time">'+new Date(notes[n].time).toLocaleString('es-MX',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})+'</span><span>'+notes[n].text+'</span></li>'; } html += '</ul>'; }
                html += '</div>';
                html += '<div class="notes-section"><h3>Historial de Trabajos</h3><div id="worklogClient"></div></div>';
            } else if (status === 'completado') {
                html += '<div class="info-message info-success">✅ Su vehículo está <strong>listo</strong>. Puede retirarlo.</div>';
                html += '<div class="detail-grid"><div class="detail-item"><div class="detail-label">Servicio</div><div class="detail-value">'+(booking.service_requested||'')+'</div></div><div class="detail-item"><div class="detail-label">Ingreso</div><div class="detail-value">'+new Date(booking.created_at).toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'})+'</div></div><div class="detail-item"><div class="detail-label">Estado</div><div class="detail-value">Listo</div></div><div class="detail-item"><div class="detail-label">Cliente</div><div class="detail-value">'+(booking.client_name||'')+'</div></div></div>';
                html += '<div class="notes-section"><h3>Historial de Trabajos</h3><div id="worklogClient"></div></div>';
            } else if (status === 'entregado') {
                html += '<div class="info-message info-success">🎉 Vehículo <strong>entregado</strong>. Gracias por confiar en Matts Motor Workshop.</div>';
            } else if (status === 'cancelled') {
                html += '<div class="info-message info-cancelled">❌ Esta cita ha sido <strong>cancelada</strong>.</div>';
            }

            dynamicContent.innerHTML = html;
            resultCard.style.display = 'block';
            resultCard.scrollIntoView({ behavior:'smooth', block:'center' });

            if (status === 'en_taller' || status === 'en_progreso' || status === 'completado') {
                setTimeout(function() { loadWorkLogClient(booking.id); }, 300);
            }
        }

        async function loadWorkLogClient(bookingId) {
            var container = document.getElementById('worklogClient'); if (!container) return;
            var result = await supabase.from('work_log').select('*').eq('booking_id',bookingId).order('created_at',{ascending:false});
            if (!result.data || result.data.length===0) { container.innerHTML = '<p class="no-notes">Sin registros aún.</p>'; return; }
            var html = '<div class="worklog-client-grid">';
            for (var i=0; i<result.data.length; i++) { var log = result.data[i]; html += '<div class="worklog-client-item"><div class="wl-header"><span style="color:var(--text-secondary);">'+log.description+'</span><span style="color:var(--text-muted);font-size:0.7rem;">'+new Date(log.created_at).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+'</span></div>'+(log.photo_url?'<img src="'+log.photo_url+'" loading="lazy">':'')+'</div>'; }
            html += '</div>'; container.innerHTML = html;
        }

        function newSearch() {
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('plateInput').value = ''; document.getElementById('plateInput').focus();
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('searchCard').scrollIntoView({ behavior:'smooth' });
        }
    </script>
</body>
</html>
