<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --red-light: #ef4444;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(220,38,38,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 70%, rgba(220,38,38,0.04) 0%, transparent 50%);
        }

        .maintenance-container {
            text-align: center;
            padding: 2rem;
            max-width: 650px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lottie-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 1.5rem;
            filter: brightness(0.9) saturate(0.8);
        }

        .maintenance-icon {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }

        .maintenance-container h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .maintenance-container p {
            color: #a3a3a3;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .maintenance-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #262626;
            color: #737373;
            font-size: 0.85rem;
        }

        .maintenance-footer strong { color: #a3a3a3; }

        .logo-small {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            text-decoration: none;
            color: inherit;
        }

        .logo-small img { height: 30px; width: auto; border-radius: 4px; }

        .logo-small span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: -0.3px;
            color: #737373;
        }

        @media (max-width: 480px) {
            .lottie-container { width: 180px; height: 180px; }
            .maintenance-container h1 { font-size: 1.8rem; }
            .maintenance-container p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="logo-small">
            <img src="logo.jpg" alt="MMW">
            <span>MATTS MOTOR WORKSHOP</span>
        </div>

        <div class="lottie-container" id="lottieAnimation"></div>

        <div class="maintenance-icon">⚙ Mantenimiento</div>
        <h1>Página temporalmente<br>fuera de servicio</h1>
        <p>Estamos trabajando para volver lo más pronto posible. Nuestro equipo está realizando mejoras para ofrecerle un mejor servicio.</p>
        
        <div class="maintenance-footer">
            <strong>Matts Motor Workshop</strong><br>
            Ingeniería de precisión para su vehículo
        </div>
    </div>

    <script>
        (function() {
            // Cargar animación Lottie
            var animation = lottie.loadAnimation({
                container: document.getElementById('lottieAnimation'),
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: 'https://assets2.lottiefiles.com/packages/lf20_6254393c-aee1-4eac-92d4-812c2f338e14.json'
            });

            // Verificar disponibilidad cada 10 minutos
            var SUPABASE_URL = 'https://pupfxetbnpgqikzhnjts.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cGZ4ZXRibnBncWlremhuanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTAwNzIsImV4cCI6MjA5OTcyNjA3Mn0.FVhkHQflNJRQbheadgL6RmzYuNbCezB3vIeaJHGS88M';
            var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            async function checkAvailability() {
                try {
                    var result = await supabase.from('site_settings').select('setting_value').eq('setting_key', 'maintenance_mode').single();
                    if (result.data && result.data.setting_value === 'false') {
                        window.location.replace('/home');
                        return;
                    }
                } catch(e) {}
                setTimeout(checkAvailability, 600000);
            }

            setTimeout(checkAvailability, 600000);
        })();
    </script>
</body>
</html>
