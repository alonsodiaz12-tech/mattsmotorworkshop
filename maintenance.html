<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --red: #dc2626;
            --red-light: #ef4444;
            --red-dark: #991b1b;
            --gold: #c9a84c;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(220,38,38,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 70%, rgba(220,38,38,0.04) 0%, transparent 50%);
        }

        .maintenance-container {
            text-align: center;
            padding: 2rem;
            max-width: 650px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animación del motor */
        .engine-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 2.5rem;
        }

        .engine-outer {
            position: absolute;
            inset: 0;
            border: 4px solid var(--border);
            border-radius: 50%;
            animation: pulse-ring 2s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.08); opacity: 0.6; border-color: var(--red); }
        }

        .engine-inner {
            position: absolute;
            inset: 15px;
            border: 3px solid var(--red-dark);
            border-radius: 50%;
            animation: spin-slow 8s linear infinite;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .engine-inner::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(220,38,38,0.6);
        }

        .engine-core {
            position: absolute;
            inset: 35px;
            border: 2px dashed rgba(220,38,38,0.3);
            border-radius: 50%;
            animation: spin-reverse 12s linear infinite;
        }

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .engine-piston {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
        }

        .piston-arm {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 20px;
            background: var(--red);
            transform-origin: top center;
            animation: piston-move 1.5s ease-in-out infinite;
        }

        @keyframes piston-move {
            0%, 100% { transform: translate(-50%, -50%) rotate(-30deg) translateY(0); }
            50% { transform: translate(-50%, -50%) rotate(-30deg) translateY(-8px); }
        }

        .piston-head {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 8px;
            background: var(--red-light);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(220,38,38,0.4);
        }

        .spark {
            position: absolute;
            top: 35%;
            right: 15%;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            animation: spark-flash 0.8s ease-in-out infinite;
        }

        @keyframes spark-flash {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(2); box-shadow: 0 0 12px var(--gold); }
        }

        .smoke-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: smoke-rise 3s ease-out infinite;
        }

        .smoke-particle:nth-child(1) { top: 60%; left: 40%; animation-delay: 0s; }
        .smoke-particle:nth-child(2) { top: 55%; left: 55%; animation-delay: 1s; }
        .smoke-particle:nth-child(3) { top: 50%; left: 35%; animation-delay: 2s; }

        @keyframes smoke-rise {
            0% { transform: translateY(0) translateX(0); opacity: 0.4; }
            100% { transform: translateY(-40px) translateX(10px); opacity: 0; }
        }

        /* Texto */
        .maintenance-icon {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--red-light);
            margin-bottom: 1.5rem;
        }

        .maintenance-container h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .maintenance-container p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .maintenance-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .maintenance-footer strong {
            color: var(--text-secondary);
        }

        .logo-small {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            text-decoration: none;
            color: inherit;
        }

        .logo-small img {
            height: 30px;
            width: auto;
            border-radius: 4px;
        }

        .logo-small span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: -0.3px;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .engine-container {
                width: 140px;
                height: 140px;
            }
            .maintenance-container h1 {
                font-size: 1.8rem;
            }
            .maintenance-container p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="logo-small">
            <img src="logo.jpg" alt="MMW">
            <span>MATTS MOTOR WORKSHOP</span>
        </div>

        <div class="engine-container">
            <div class="engine-outer"></div>
            <div class="engine-inner"></div>
            <div class="engine-core"></div>
            <div class="engine-piston">
                <div class="piston-arm">
                    <div class="piston-head"></div>
                </div>
            </div>
            <div class="spark"></div>
            <div class="smoke-particle"></div>
            <div class="smoke-particle"></div>
            <div class="smoke-particle"></div>
        </div>

        <div class="maintenance-icon">⚙ Mantenimiento</div>
        <h1>Página temporalmente<br>fuera de servicio</h1>
        <p>Estamos trabajando para volver lo más pronto posible. Nuestro equipo está realizando mejoras para ofrecerle un mejor servicio.</p>
        
        <div class="maintenance-footer">
            <strong>Matts Motor Workshop</strong><br>
            Ingeniería de precisión para su vehículo
        </div>
    </div>
</body>
</html>
