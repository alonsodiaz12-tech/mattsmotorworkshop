<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(220,38,38,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 70%, rgba(220,38,38,0.04) 0%, transparent 50%);
        }

        .maintenance-container {
            text-align: center;
            padding: 2rem;
            max-width: 650px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== MOTOR SVG ========== */
        .engine-wrapper {
            width: 260px;
            height: 220px;
            margin: 0 auto 1.5rem;
        }

        .engine-wrapper svg {
            width: 100%;
            height: 100%;
        }

        /* Bloque del motor */
        .engine-block {
            fill: #1a1a1a;
            stroke: #333;
            stroke-width: 2;
        }

        /* Culatas */
        .cylinder-head {
            fill: #222;
            stroke: #333;
            stroke-width: 1.5;
        }

        /* Pistones */
        .piston {
            fill: #444;
            stroke: #555;
            stroke-width: 1;
        }

        .piston-1 { animation: piston-updown 1.2s ease-in-out infinite; }
        .piston-2 { animation: piston-updown 1.2s ease-in-out 0.3s infinite; }
        .piston-3 { animation: piston-updown 1.2s ease-in-out 0.6s infinite; }
        .piston-4 { animation: piston-updown 1.2s ease-in-out 0.9s infinite; }

        @keyframes piston-updown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(12px); }
        }

        /* Bielas */
        .connecting-rod {
            stroke: #666;
            stroke-width: 2;
            stroke-linecap: round;
        }

        .rod-1 { animation: rod-move 1.2s ease-in-out infinite; }
        .rod-2 { animation: rod-move 1.2s ease-in-out 0.3s infinite; }
        .rod-3 { animation: rod-move 1.2s ease-in-out 0.6s infinite; }
        .rod-4 { animation: rod-move 1.2s ease-in-out 0.9s infinite; }

        @keyframes rod-move {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        /* Cigüeñal */
        .crankshaft {
            fill: none;
            stroke: #dc2626;
            stroke-width: 3;
            stroke-linecap: round;
            animation: crank-spin 1.2s linear infinite;
        }

        @keyframes crank-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Chispa en bujía */
        .spark-plug {
            fill: #c9a84c;
            opacity: 0;
        }

        .spark-1 { animation: spark-pop 1.2s ease-in-out infinite; }
        .spark-2 { animation: spark-pop 1.2s ease-in-out 0.3s infinite; }
        .spark-3 { animation: spark-pop 1.2s ease-in-out 0.6s infinite; }
        .spark-4 { animation: spark-pop 1.2s ease-in-out 0.9s infinite; }

        @keyframes spark-pop {
            0%, 100% { opacity: 0; r: 2; }
            50% { opacity: 1; r: 6; }
        }

        /* Humo del escape */
        .exhaust-smoke {
            fill: rgba(255,255,255,0.08);
            animation: smoke-float 3s ease-out infinite;
        }

        .smoke-1 { animation-delay: 0s; }
        .smoke-2 { animation-delay: 1s; }
        .smoke-3 { animation-delay: 2s; }

        @keyframes smoke-float {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            100% { transform: translateY(-40px) scale(3); opacity: 0; }
        }

        /* Texto */
        .maintenance-icon {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }

        .maintenance-container h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .maintenance-container p {
            color: #a3a3a3;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .maintenance-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #262626;
            color: #737373;
            font-size: 0.85rem;
        }

        .maintenance-footer strong { color: #a3a3a3; }

        .logo-small {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            text-decoration: none;
            color: inherit;
        }

        .logo-small img { height: 30px; width: auto; border-radius: 4px; }

        .logo-small span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: -0.3px;
            color: #737373;
        }

        @media (max-width: 480px) {
            .engine-wrapper { width: 200px; height: 170px; }
            .maintenance-container h1 { font-size: 1.8rem; }
            .maintenance-container p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="logo-small">
            <img src="logo.jpg" alt="MMW">
            <span>MATTS MOTOR WORKSHOP</span>
        </div>

        <!-- Motor V8 SVG animado -->
        <div class="engine-wrapper">
            <svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
                <!-- Humo del escape -->
                <circle cx="230" cy="80" r="8" class="exhaust-smoke smoke-1"/>
                <circle cx="235" cy="75" r="6" class="exhaust-smoke smoke-2"/>
                <circle cx="228" cy="85" r="7" class="exhaust-smoke smoke-3"/>

                <!-- Bloque del motor -->
                <rect x="20" y="60" width="180" height="80" rx="8" class="engine-block"/>
                
                <!-- Culatas -->
                <rect x="25" y="55" width="40" height="15" rx="3" class="cylinder-head"/>
                <rect x="75" y="55" width="40" height="15" rx="3" class="cylinder-head"/>
                <rect x="125" y="55" width="40" height="15" rx="3" class="cylinder-head"/>
                <rect x="175" y="55" width="20" height="15" rx="3" class="cylinder-head"/>

                <!-- Pistones -->
                <rect x="30" y="75" width="30" height="20" rx="3" class="piston piston-1"/>
                <rect x="80" y="75" width="30" height="20" rx="3" class="piston piston-2"/>
                <rect x="130" y="75" width="30" height="20" rx="3" class="piston piston-3"/>
                <rect x="175" y="75" width="20" height="20" rx="3" class="piston piston-4"/>

                <!-- Bielas -->
                <g transform-origin="45 105">
                    <line x1="45" y1="95" x2="45" y2="115" class="connecting-rod rod-1"/>
                </g>
                <g transform-origin="95 105">
                    <line x1="95" y1="95" x2="95" y2="115" class="connecting-rod rod-2"/>
                </g>
                <g transform-origin="145 105">
                    <line x1="145" y1="95" x2="145" y2="115" class="connecting-rod rod-3"/>
                </g>
                <g transform-origin="185 105">
                    <line x1="185" y1="95" x2="185" y2="115" class="connecting-rod rod-4"/>
                </g>

                <!-- Cigüeñal -->
                <g transform-origin="110 115">
                    <path d="M35 115 L65 115 L85 110 L105 115 L125 110 L145 115 L185 115" class="crankshaft"/>
                </g>

                <!-- Cárter -->
                <rect x="30" y="115" width="160" height="25" rx="5" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>

                <!-- Bujías (chispas) -->
                <circle cx="45" cy="50" r="2" class="spark-plug spark-1"/>
                <circle cx="95" cy="50" r="2" class="spark-plug spark-2"/>
                <circle cx="145" cy="50" r="2" class="spark-plug spark-3"/>
                <circle cx="185" cy="50" r="2" class="spark-plug spark-4"/>

                <!-- Cables de bujía -->
                <line x1="45" y1="52" x2="45" y2="55" stroke="#555" stroke-width="1"/>
                <line x1="95" y1="52" x2="95" y2="55" stroke="#555" stroke-width="1"/>
                <line x1="145" y1="52" x2="145" y2="55" stroke="#555" stroke-width="1"/>
                <line x1="185" y1="52" x2="185" y2="55" stroke="#555" stroke-width="1"/>

                <!-- Tubo de escape -->
                <rect x="200" y="70" width="10" height="15" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
                <rect x="205" y="60" width="30" height="8" rx="3" fill="#222" stroke="#333" stroke-width="1"/>

                <!-- Tornillos del bloque -->
                <circle cx="30" cy="65" r="3" fill="#3a3a3a" stroke="#444" stroke-width="0.5"/>
                <circle cx="190" cy="65" r="3" fill="#3a3a3a" stroke="#444" stroke-width="0.5"/>
                <circle cx="30" cy="135" r="3" fill="#3a3a3a" stroke="#444" stroke-width="0.5"/>
                <circle cx="190" cy="135" r="3" fill="#3a3a3a" stroke="#444" stroke-width="0.5"/>

                <!-- Vibración del motor -->
                <animateTransform attributeName="transform" type="translate" values="0,0;1,-0.5;-1,0.5;0,0" dur="0.08s" repeatCount="indefinite"/>
            </svg>
        </div>

        <div class="maintenance-icon">⚙ Mantenimiento</div>
        <h1>Página temporalmente<br>fuera de servicio</h1>
        <p>Estamos trabajando para volver lo más pronto posible. Nuestro equipo está realizando mejoras para ofrecerle un mejor servicio.</p>
        
        <div class="maintenance-footer">
            <strong>Matts Motor Workshop</strong><br>
            Ingeniería de precisión para su vehículo
        </div>
    </div>

</body>
</html>
