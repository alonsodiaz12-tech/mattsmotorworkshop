<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 550px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-small {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2.5rem;
            text-decoration: none;
            color: inherit;
        }

        .logo-small img {
            height: 28px;
            width: auto;
            border-radius: 4px;
            filter: brightness(0.8);
        }

        .logo-small span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: -0.3px;
            color: #737373;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            border: 2px solid #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
            50% { box-shadow: 0 0 0 20px rgba(220,38,38,0); }
        }

        .icon-circle svg {
            width: 36px;
            height: 36px;
            stroke: #dc2626;
            fill: none;
            stroke-width: 1.5;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        p {
            color: #a3a3a3;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .footer-line {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #262626;
            color: #737373;
            font-size: 0.8rem;
        }

        .footer-line strong {
            color: #a3a3a3;
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .icon-circle { width: 64px; height: 64px; }
            .icon-circle svg { width: 28px; height: 28px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-small">
            <img src="logo.jpg" alt="MMW">
            <span>MATTS MOTOR WORKSHOP</span>
        </div>

        <div class="icon-circle">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="label">Mantenimiento</div>
        <h1>Página temporalmente<br>fuera de servicio</h1>
        <p>Estamos trabajando para volver lo más pronto posible.</p>
        
        <div class="footer-line">
            <strong>Matts Motor Workshop</strong><br>
            Ingeniería de precisión para su vehículo
        </div>
    </div>

        <script>
        (function() {
            var SUPABASE_URL = 'https://pupfxetbnpgqikzhnjts.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cGZ4ZXRibnBncWlremhuanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTAwNzIsImV4cCI6MjA5OTcyNjA3Mn0.FVhkHQflNJRQbheadgL6RmzYuNbCezB3vIeaJHGS88M';
            var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            async function checkAvailability() {
                try {
                    var result = await supabase.from('site_settings').select('setting_value').eq('setting_key', 'maintenance_mode').single();
                    if (result.data && result.data.setting_value === 'false') {
                        window.location.replace('/home');
                        return;
                    }
                } catch(e) {}
                setTimeout(checkAvailability, 5000);
            }

            setTimeout(checkAvailability, 5000);
        })();
    </script>
</body>
</html>
