<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Matts Motor Workshop</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-elevated: #1a1a1a;
            --bg-input: #0f0f0f;
            --red: #dc2626;
            --red-hover: #b91c1c;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #6b7280;
            --border: #262626;
            --border-light: #333333;
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        #loginScreen {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #loginScreen h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }

        #loginScreen .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        #loginScreen input {
            display: block;
            width: 100%;
            padding: 0.85rem 1.2rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
            margin-bottom: 1rem;
            outline: none;
            font-family: inherit;
        }

        #loginScreen input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
        }

        #loginScreen button {
            width: 100%;
            padding: 0.85rem;
            background: var(--red);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        #loginScreen button:hover { background: var(--red-hover); }
        #loginScreen button:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            display: none;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            background: rgba(239,68,68,0.08);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .back-link:hover { color: var(--text-secondary); }

        #panelScreen {
            display: none;
            width: 95%;
            max-width: 1200px;
            margin: 1.5rem auto;
        }

        .panel-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .panel-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .header-actions a:hover { color: var(--text-primary); }

        .btn-logout {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0.45rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-logout:hover { border-color: var(--red); color: var(--red); }

        /* Toggle Switch */
        .maintenance-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .maintenance-toggle span {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            transition: var(--transition);
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: var(--text-muted);
            transition: var(--transition);
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--red);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background: white;
        }

        .tab-nav {
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            display: flex;
            gap: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 0.9rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            position: relative;
        }

        .tab-btn:hover { color: var(--text-secondary); }
        
        .tab-btn.active {
            color: var(--text-primary);
            border-bottom-color: var(--red);
        }

        .panel-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            padding: 2rem;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .section-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .section-header-row h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .filter-bar {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.4rem 0.9rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
        }

        .filter-chip:hover { border-color: var(--border-light); color: var(--text-secondary); }
        .filter-chip.active { background: var(--red); border-color: var(--red); color: white; }

        .data-list { display: grid; gap: 0.5rem; }

        .data-row {
            background: var(--bg-input);
            padding: 0.85rem 1.1rem;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .data-row:hover { border-color: var(--border-light); }

        .data-row-actions { display: flex; gap: 0.4rem; }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-edit { background: #4b5563; }
        .btn-edit:hover { background: #6b7280; }
        .btn-delete { background: #dc2626; }
        .btn-delete:hover { background: #b91c1c; }

        .btn-primary {
            padding: 0.55rem 1.2rem;
            background: var(--red);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-primary:hover { background: var(--red-hover); }

        .btn-secondary {
            padding: 0.55rem 1.2rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-secondary:hover { border-color: var(--border-light); color: var(--text-primary); }

        .inline-form {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-top: 1rem;
            display: grid;
            gap: 0.85rem;
        }

        .inline-form input,
        .inline-form textarea,
        .inline-form select {
            padding: 0.7rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            width: 100%;
        }

        .inline-form input:focus,
        .inline-form textarea:focus,
        .inline-form select:focus { border-color: var(--red); }

        .inline-form textarea { resize: vertical; min-height: 70px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }

        .form-actions { display: flex; gap: 0.5rem; margin-top: 0.25rem; }

        .booking-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            display: grid;
            gap: 1rem;
            transition: var(--transition);
        }

        .booking-card:hover { border-color: var(--border-light); }

        .booking-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .booking-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

        .plate-badge {
            background: var(--bg-dark);
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            font-family: 'Montserrat', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid var(--border);
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending { background: rgba(245,158,11,0.12); color: #fbbf24; }
        .status-confirmed { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .status-in_progress { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .status-completed { background: rgba(34,197,94,0.12); color: #4ade80; }
        .status-cancelled { background: rgba(239,68,68,0.12); color: #f87171; }

        .booking-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .booking-detail-grid strong { color: var(--text-primary); }

        .booking-notes {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.85rem 1rem;
        }

        .booking-notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .booking-notes-header span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .note-list { list-style: none; display: grid; gap: 0.4rem; }

        .note-item {
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding: 0.4rem 0.6rem;
            background: var(--bg-input);
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .note-time { color: var(--text-muted); font-size: 0.7rem; white-space: nowrap; }

        .booking-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        .booking-actions select {
            padding: 0.4rem 0.7rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.78rem;
            cursor: pointer;
            font-family: inherit;
        }

        .success-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #166534;
            color: #bbf7d0;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 0.85rem;
            display: none;
            z-index: 9999;
            border: 1px solid #22c55e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }
        .loading-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 768px) {
            .panel-header { flex-direction: column; text-align: center; }
            .tab-nav { gap: 0; }
            .tab-btn { padding: 0.7rem 1rem; font-size: 0.78rem; }
            .form-row { grid-template-columns: 1fr; }
            .booking-detail-grid { grid-template-columns: 1fr; }
            .data-row { flex-direction: column; text-align: left; }
            .maintenance-toggle { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Matts Motor Workshop</h2>
        <p class="subtitle">Panel de Administración</p>
        <input type="email" id="adminEmail" placeholder="Correo electrónico" autofocus>
        <input type="password" id="adminPassword" placeholder="Contraseña">
        <p class="error-msg" id="loginError"></p>
        <button id="loginBtn">Iniciar Sesión</button>
        <a href="/home" class="back-link">Volver al taller</a>
    </div>

    <div id="panelScreen">
        <div class="panel-header">
            <h1>Panel de Administración</h1>
            <div class="header-actions">
                <div class="maintenance-toggle">
                    <span>Mantenimiento</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="maintenanceSwitch" onchange="toggleMaintenance(this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <span style="color:var(--text-muted);font-size:0.8rem;" id="loggedUser"></span>
                <a href="/home">Ver taller</a>
                <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="bookings">Citas</button>
            <button class="tab-btn" data-tab="services">Servicios</button>
            <button class="tab-btn" data-tab="gallery">Galería</button>
            <button class="tab-btn" data-tab="testimonials">Testimonios</button>
        </div>

        <div class="panel-content">
            <div class="success-toast" id="successMsg">Cambios guardados</div>

            <div class="tab-panel active" id="tab-bookings">
                <div class="filter-bar">
                    <button class="filter-chip active" data-filter="all">Todas</button>
                    <button class="filter-chip" data-filter="pending">Pendientes</button>
                    <button class="filter-chip" data-filter="confirmed">Confirmadas</button>
                    <button class="filter-chip" data-filter="in_progress">En progreso</button>
                    <button class="filter-chip" data-filter="completed">Completadas</button>
                    <button class="filter-chip" data-filter="cancelled">Canceladas</button>
                </div>
                <div class="data-list" id="bookingsList"><div class="loading-state">Cargando citas...</div></div>
            </div>

            <div class="tab-panel" id="tab-services">
                <div class="section-header-row"><h3>Servicios del taller</h3><button class="btn-primary" id="addServiceBtn">Nuevo servicio</button></div>
                <div class="data-list" id="servicesList"><div class="loading-state">Cargando servicios...</div></div>
                <div class="inline-form" id="serviceForm" style="display:none;">
                    <input type="text" id="serviceTitle" placeholder="Nombre del servicio">
                    <textarea id="serviceDesc" placeholder="Descripción"></textarea>
                    <select id="serviceIcon">
                        <option value="🔧">Mecánica</option><option value="⚡">Electricidad</option><option value="🖥️">Scanner</option>
                        <option value="🛑">Frenos</option><option value="❄️">Aire acondicionado</option><option value="🛢️">Aceite</option>
                        <option value="🔩">General</option><option value="🚗">Motor</option>
                    </select>
                    <input type="number" id="serviceOrder" placeholder="Orden (1, 2, 3...)" min="1" value="1">
                    <input type="hidden" id="serviceEditId">
                    <div class="form-actions"><button class="btn-primary" id="saveServiceBtn">Guardar</button><button class="btn-secondary" id="cancelServiceBtn">Cancelar</button></div>
                </div>
            </div>

            <div class="tab-panel" id="tab-gallery">
                <div class="section-header-row"><h3>Imágenes de la galería</h3></div>
                <div class="data-list" id="galleryList"><div class="loading-state">Cargando galería...</div></div>
                <div class="inline-form">
                    <input type="text" id="galleryUrl" placeholder="URL de la imagen">
                    <input type="text" id="galleryAlt" placeholder="Descripción breve">
                    <button class="btn-primary" id="addGalleryBtn">Agregar imagen</button>
                </div>
            </div>

            <div class="tab-panel" id="tab-testimonials">
                <div class="section-header-row"><h3>Testimonios de clientes</h3></div>
                <div class="data-list" id="testimonialsList"><div class="loading-state">Cargando testimonios...</div></div>
                <div class="inline-form">
                    <input type="text" id="testimonialName" placeholder="Nombre del cliente">
                    <input type="number" id="testimonialStars" placeholder="Calificación (1-5)" min="1" max="5" value="5">
                    <textarea id="testimonialText" placeholder="Texto del testimonio"></textarea>
                    <button class="btn-primary" id="addTestimonialBtn">Agregar testimonio</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var SUPABASE_URL = 'https://pupfxetbnpgqikzhnjts.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cGZ4ZXRibnBncWlremhuanRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTAwNzIsImV4cCI6MjA5OTcyNjA3Mn0.FVhkHQflNJRQbheadgL6RmzYuNbCezB3vIeaJHGS88M';
            var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            var currentFilter = 'all';
            var session = null;

            function showSuccess() {
                var msg = document.getElementById('successMsg');
                msg.style.display = 'block';
                setTimeout(function() { msg.style.display = 'none'; }, 2500);
            }

            // Cargar estado del switch
            async function loadMaintenanceState() {
                try {
                    var result = await supabase.from('site_settings').select('setting_value').eq('setting_key', 'maintenance_mode').single();
                    if (result.data) {
                        document.getElementById('maintenanceSwitch').checked = result.data.setting_value === 'true';
                    }
                } catch(e) {}
            }

            // Toggle mantenimiento
            async function toggleMaintenance(active) {
                try {
                    await supabase.from('site_settings').upsert({ setting_key: 'maintenance_mode', setting_value: active ? 'true' : 'false' }, { onConflict: 'setting_key' });
                    showSuccess();
                } catch(e) {}
            }
            window.toggleMaintenance = toggleMaintenance;

            document.addEventListener('DOMContentLoaded', function() {
                var tabBtns = document.querySelectorAll('.tab-btn');
                tabBtns.forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var tab = this.dataset.tab;
                        tabBtns.forEach(function(b) { b.classList.remove('active'); });
                        this.classList.add('active');
                        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
                        document.getElementById('tab-' + tab).classList.add('active');
                        if (tab === 'bookings') renderBookings();
                        if (tab === 'services') renderServicesList();
                        if (tab === 'gallery') renderGalleryList();
                        if (tab === 'testimonials') renderTestimonialsList();
                    });
                });

                document.getElementById('loginBtn').addEventListener('click', login);
                document.getElementById('adminPassword').addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
                document.getElementById('logoutBtn').addEventListener('click', logout);
                document.getElementById('addServiceBtn').addEventListener('click', showServiceForm);
                document.getElementById('saveServiceBtn').addEventListener('click', saveService);
                document.getElementById('cancelServiceBtn').addEventListener('click', cancelServiceForm);
                document.getElementById('addGalleryBtn').addEventListener('click', addGalleryItem);
                document.getElementById('addTestimonialBtn').addEventListener('click', addTestimonial);

                document.querySelectorAll('.filter-chip').forEach(function(chip) {
                    chip.addEventListener('click', function() {
                        document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
                        this.classList.add('active');
                        currentFilter = this.dataset.filter;
                        renderBookings();
                    });
                });

                checkSession();
            });

            async function checkSession() {
                var result = await supabase.auth.getSession();
                if (result.data && result.data.session) {
                    session = result.data.session;
                    showPanel();
                }
            }

            async function login() {
                var email = document.getElementById('adminEmail').value.trim();
                var password = document.getElementById('adminPassword').value;
                var loginBtn = document.getElementById('loginBtn');
                var errorMsg = document.getElementById('loginError');

                if (!email || !password) { errorMsg.textContent = 'Complete todos los campos'; errorMsg.style.display = 'block'; return; }

                loginBtn.disabled = true;
                loginBtn.textContent = 'Verificando...';
                errorMsg.style.display = 'none';

                var userIP = 'desconocida';
                try { var ipResp = await fetch('https://api.ipify.org?format=json'); var ipData = await ipResp.json(); userIP = ipData.ip.trim(); } catch(e) {}

                try {
                    var ipResult = await supabase.from('allowed_admin_ips').select('ip_address');
                    var ipList = ipResult.data ? ipResult.data.map(function(r) { return r.ip_address.trim(); }) : [];
                    if (!ipList.includes(userIP)) {
                        errorMsg.textContent = 'Acceso denegado. IP no autorizada: ' + userIP;
                        errorMsg.style.display = 'block'; loginBtn.disabled = false; loginBtn.textContent = 'Iniciar Sesión'; return;
                    }
                } catch(e) { errorMsg.textContent = 'Error de conexión'; errorMsg.style.display = 'block'; loginBtn.disabled = false; loginBtn.textContent = 'Iniciar Sesión'; return; }

                loginBtn.textContent = 'Ingresando...';
                var authResult = await supabase.auth.signInWithPassword({ email: email, password: password });

                if (authResult.error) { errorMsg.textContent = authResult.error.message || 'Credenciales incorrectas'; errorMsg.style.display = 'block'; loginBtn.disabled = false; loginBtn.textContent = 'Iniciar Sesión'; return; }

                if (authResult.data && authResult.data.session) { session = authResult.data.session; showPanel(); }
            }

            function showPanel() {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('panelScreen').style.display = 'block';
                document.body.style.alignItems = 'flex-start';
                if (session && session.user) document.getElementById('loggedUser').textContent = session.user.email;
                loadMaintenanceState();
                renderBookings();
            }

            async function logout() {
                await supabase.auth.signOut();
                session = null;
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('panelScreen').style.display = 'none';
                document.body.style.alignItems = 'center';
                document.getElementById('adminPassword').value = '';
                document.getElementById('loginError').style.display = 'none';
            }

            async function loadServices() { var result = await supabase.from('services').select('*').order('display_order'); if (result.error) { console.error(result.error); return []; } return result.data; }
            async function loadGallery() { var result = await supabase.from('gallery').select('*').order('created_at', { ascending: false }); if (result.error) { console.error(result.error); return []; } return result.data; }
            async function loadTestimonials() { var result = await supabase.from('testimonials').select('*').order('created_at', { ascending: false }); if (result.error) { console.error(result.error); return []; } return result.data; }
            async function loadBookings(filter) { var query = supabase.from('bookings').select('*').order('created_at', { ascending: false }); if (filter && filter !== 'all') query = query.eq('status', filter); var result = await query; if (result.error) { console.error(result.error); return []; } return result.data; }

            async function renderServicesList() {
                var container = document.getElementById('servicesList');
                var services = await loadServices();
                if (services.length === 0) { container.innerHTML = '<div class="empty-state">No hay servicios registrados</div>'; return; }
                var html = '';
                for (var i = 0; i < services.length; i++) {
                    var s = services[i];
                    html += '<div class="data-row"><span>' + (s.icon || '') + ' <strong>' + s.title + '</strong> <span style="color:var(--text-muted);font-size:0.75rem;">Orden: ' + s.display_order + '</span></span><div class="data-row-actions"><button class="btn-sm btn-edit" onclick="window._editService(' + s.id + ')">Editar</button><button class="btn-sm btn-delete" onclick="window._deleteService(' + s.id + ')">Eliminar</button></div></div>';
                }
                container.innerHTML = html;
            }

            async function renderGalleryList() {
                var container = document.getElementById('galleryList');
                var gallery = await loadGallery();
                if (gallery.length === 0) { container.innerHTML = '<div class="empty-state">No hay imágenes en la galería</div>'; return; }
                var html = '';
                for (var i = 0; i < gallery.length; i++) { var g = gallery[i]; html += '<div class="data-row"><span>' + (g.alt_text || 'Sin descripción') + '</span><button class="btn-sm btn-delete" onclick="window._deleteGallery(' + g.id + ')">Eliminar</button></div>'; }
                container.innerHTML = html;
            }

            async function renderTestimonialsList() {
                var container = document.getElementById('testimonialsList');
                var testimonials = await loadTestimonials();
                if (testimonials.length === 0) { container.innerHTML = '<div class="empty-state">No hay testimonios registrados</div>'; return; }
                var html = '';
                for (var i = 0; i < testimonials.length; i++) {
                    var t = testimonials[i]; var stars = ''; for (var j = 0; j < t.stars; j++) stars += '★';
                    html += '<div class="data-row"><span><strong>' + t.client_name + '</strong> <span style="color:#c9a84c;">' + stars + '</span></span><button class="btn-sm btn-delete" onclick="window._deleteTestimonial(' + t.id + ')">Eliminar</button></div>';
                }
                container.innerHTML = html;
            }

            async function renderBookings() {
                var container = document.getElementById('bookingsList');
                var bookings = await loadBookings(currentFilter);
                if (bookings.length === 0) { container.innerHTML = '<div class="empty-state">No hay citas para mostrar</div>'; return; }
                var html = '';
                for (var i = 0; i < bookings.length; i++) {
                    var b = bookings[i];
                    var statusMap = { pending: { text: 'Pendiente', cls: 'status-pending' }, confirmed: { text: 'Confirmada', cls: 'status-confirmed' }, in_progress: { text: 'En progreso', cls: 'status-in_progress' }, completed: { text: 'Completada', cls: 'status-completed' }, cancelled: { text: 'Cancelada', cls: 'status-cancelled' } };
                    var st = statusMap[b.status] || statusMap.pending;
                    var dateStr = b.preferred_date ? new Date(b.preferred_date + 'T00:00:00').toLocaleDateString('es-MX', { weekday:'short', year:'numeric', month:'short', day:'numeric' }) : 'Sin fecha';
                    var notes = b.notes || []; if (typeof notes === 'string') notes = JSON.parse(notes);
                    var notesHtml = notes.length === 0 ? '<p style="color:var(--text-muted);font-size:0.78rem;">Sin notas</p>' : '<ul class="note-list">' + notes.map(function(n) { return '<li class="note-item"><span>' + n.text + '</span><span class="note-time">' + new Date(n.time).toLocaleString('es-MX', {hour:'2-digit',minute:'2-digit'}) + '</span></li>'; }).join('') + '</ul>';
                    
                    html += '<div class="booking-card">';
                    html += '<div class="booking-header-row"><div class="booking-meta"><strong>' + dateStr + '</strong>' + (b.preferred_time ? ' <span style="color:var(--text-muted);">' + b.preferred_time + '</span>' : '') + (b.plate_number ? '<span class="plate-badge">' + b.plate_number + '</span>' : '') + '</div><span class="status-badge ' + st.cls + '">' + st.text + '</span></div>';
                    html += '<div class="booking-detail-grid"><div><strong>Cliente:</strong> ' + b.client_name + '</div><div><strong>Teléfono:</strong> ' + b.phone + '</div><div><strong>Vehículo:</strong> ' + b.vehicle + '</div><div><strong>Servicio:</strong> ' + b.service_requested + '</div></div>';
                    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;"><div><label style="font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:0.25rem;">Placa</label><input type="text" value="' + (b.plate_number || '') + '" onchange="window._updatePlate(' + b.id + ', this.value)" placeholder="ABC-1234" style="width:100%;padding:0.4rem 0.6rem;background:var(--bg-dark);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:0.8rem;font-family:monospace;letter-spacing:1px;text-transform:uppercase;outline:none;"></div><div><label style="font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:0.25rem;">Entrega estimada</label><input type="date" value="' + (b.estimated_delivery || '') + '" onchange="window._updateEstimate(' + b.id + ', this.value)" style="width:100%;padding:0.4rem 0.6rem;background:var(--bg-dark);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:0.8rem;color-scheme:dark;outline:none;"></div></div>';
                    html += '<div class="booking-notes"><div class="booking-notes-header"><span>Notas del taller</span><button class="btn-sm btn-edit" onclick="window._addNote(' + b.id + ')" style="font-size:0.7rem;">Agregar nota</button></div>' + notesHtml + '</div>';
                    html += '<div class="booking-actions"><select onchange="window._updateStatus(' + b.id + ', this.value)"><option value="pending"' + (b.status==='pending'?' selected':'') + '>Pendiente</option><option value="confirmed"' + (b.status==='confirmed'?' selected':'') + '>Confirmar</option><option value="in_progress"' + (b.status==='in_progress'?' selected':'') + '>En progreso</option><option value="completed"' + (b.status==='completed'?' selected':'') + '>Completar</option><option value="cancelled"' + (b.status==='cancelled'?' selected':'') + '>Cancelar</option></select><button class="btn-sm btn-delete" onclick="window._deleteBooking(' + b.id + ')">Eliminar cita</button></div>';
                    html += '</div>';
                }
                container.innerHTML = html;
            }

            function showServiceForm() { document.getElementById('serviceForm').style.display = 'grid'; document.getElementById('serviceEditId').value = ''; document.getElementById('serviceTitle').value = ''; document.getElementById('serviceDesc').value = ''; document.getElementById('serviceOrder').value = '1'; }
            function cancelServiceForm() { document.getElementById('serviceForm').style.display = 'none'; }

            async function saveService() {
                var editId = document.getElementById('serviceEditId').value;
                var title = document.getElementById('serviceTitle').value, desc = document.getElementById('serviceDesc').value, icon = document.getElementById('serviceIcon').value, order = parseInt(document.getElementById('serviceOrder').value) || 1;
                if (!title || !desc) { alert('Complete todos los campos'); return; }
                if (editId) { await supabase.from('services').update({ title: title, description: desc, icon: icon, display_order: order }).eq('id', editId); }
                else { await supabase.from('services').insert([{ title: title, description: desc, icon: icon, display_order: order }]); }
                cancelServiceForm(); await renderServicesList(); showSuccess();
            }

            async function editService(id) {
                var result = await supabase.from('services').select('*').eq('id', id).single();
                if (result.data) {
                    document.getElementById('serviceEditId').value = result.data.id; document.getElementById('serviceTitle').value = result.data.title;
                    document.getElementById('serviceDesc').value = result.data.description || ''; document.getElementById('serviceIcon').value = result.data.icon || '🔧';
                    document.getElementById('serviceOrder').value = result.data.display_order || 1; document.getElementById('serviceForm').style.display = 'grid';
                    document.querySelector('.tab-btn[data-tab="services"]').click();
                }
            }

            async function deleteService(id) { if (confirm('Eliminar este servicio?')) { await supabase.from('services').delete().eq('id', id); await renderServicesList(); showSuccess(); } }
            async function addGalleryItem() { var url = document.getElementById('galleryUrl').value, alt = document.getElementById('galleryAlt').value || 'Trabajo realizado'; if (!url) { alert('Ingrese la URL de la imagen'); return; } await supabase.from('gallery').insert([{ image_url: url, alt_text: alt }]); document.getElementById('galleryUrl').value = ''; document.getElementById('galleryAlt').value = ''; await renderGalleryList(); showSuccess(); }
            async function deleteGalleryItem(id) { if (confirm('Eliminar esta imagen?')) { await supabase.from('gallery').delete().eq('id', id); await renderGalleryList(); showSuccess(); } }
            async function addTestimonial() { var name = document.getElementById('testimonialName').value, stars = parseInt(document.getElementById('testimonialStars').value) || 5, text = document.getElementById('testimonialText').value; if (!name || !text) { alert('Complete todos los campos'); return; } await supabase.from('testimonials').insert([{ client_name: name, stars: Math.min(5, Math.max(1, stars)), testimonial_text: text }]); document.getElementById('testimonialName').value = ''; document.getElementById('testimonialStars').value = '5'; document.getElementById('testimonialText').value = ''; await renderTestimonialsList(); showSuccess(); }
            async function deleteTestimonial(id) { if (confirm('Eliminar este testimonio?')) { await supabase.from('testimonials').delete().eq('id', id); await renderTestimonialsList(); showSuccess(); } }
            async function updateBookingPlate(id, plate) { await supabase.from('bookings').update({ plate_number: plate.toUpperCase() }).eq('id', id); }
            async function updateBookingEstimate(id, date) { await supabase.from('bookings').update({ estimated_delivery: date }).eq('id', id); showSuccess(); }
            async function updateBookingStatus(id, status) { await supabase.from('bookings').update({ status: status }).eq('id', id); await renderBookings(); showSuccess(); }
            async function deleteBooking(id) { if (confirm('Eliminar esta cita?')) { await supabase.from('bookings').delete().eq('id', id); await renderBookings(); showSuccess(); } }
            async function addBookingNote(id) { var note = prompt('Agregar nota:'); if (note && note.trim()) { var result = await supabase.from('bookings').select('notes').eq('id', id).single(); var notes = result.data?.notes || []; if (typeof notes === 'string') notes = JSON.parse(notes); notes.push({ text: note.trim(), time: new Date().toISOString() }); await supabase.from('bookings').update({ notes: notes }).eq('id', id); await renderBookings(); showSuccess(); } }

            window._editService = editService; window._deleteService = deleteService; window._deleteGallery = deleteGalleryItem;
            window._deleteTestimonial = deleteTestimonial; window._updatePlate = updateBookingPlate; window._updateEstimate = updateBookingEstimate;
            window._updateStatus = updateBookingStatus; window._deleteBooking = deleteBooking; window._addNote = addBookingNote;
        })();
    </script>
</body>
</html>
