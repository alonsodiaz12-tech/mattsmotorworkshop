<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Matts Motor Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-elevated: #1a1a1a;
            --red: #dc2626;
            --red-light: #ef4444;
            --red-dark: #991b1b;
            --gold: #c9a84c;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border: #262626;
            --border-light: #333333;
            --glass: rgba(255,255,255,0.03);
            --radius: 12px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        #loginScreen {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3.5rem;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #loginScreen .logo-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        #loginScreen h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        #loginScreen .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        #loginScreen input {
            display: block;
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            margin-bottom: 1rem;
            outline: none;
        }

        #loginScreen input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220,38,38,0.15);
        }

        #loginScreen button {
            width: 100%;
            padding: 0.9rem;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }

        #loginScreen button:hover {
            background: var(--red-light);
            box-shadow: 0 8px 25px rgba(220,38,38,0.3);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--red-light);
        }

        #panelScreen {
            display: none;
            width: 95%;
            max-width: 1300px;
            margin: 2rem auto;
        }

        .panel-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .panel-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .btn-logout {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-logout:hover {
            border-color: var(--red);
            color: var(--red-light);
        }

        .panel-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            padding: 2rem;
        }

        .admin-section {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }

        .admin-section h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .item-list {
            display: grid;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .item-row {
            background: var(--bg-elevated);
            padding: 1rem 1.2rem;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--red-dark);
            flex-wrap: wrap;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .item-row:hover {
            border-left-color: var(--red);
        }

        .btn-admin {
            padding: 0.4rem 0.9rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            transition: var(--transition);
        }

        .btn-edit {
            background: #3b82f6;
        }
        .btn-edit:hover {
            background: #2563eb;
        }
        .btn-delete {
            background: #ef4444;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
        .btn-add {
            background: var(--red);
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .btn-add:hover {
            background: var(--red-light);
        }

        .admin-form {
            display: grid;
            gap: 1rem;
            margin-top: 1rem;
            background: var(--bg-elevated);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .admin-form input,
        .admin-form textarea,
        .admin-form select {
            padding: 0.8rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .admin-form input:focus,
        .admin-form textarea:focus,
        .admin-form select:focus {
            border-color: var(--red);
        }

        .admin-form textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-cancel {
            background: var(--text-muted);
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .success-msg {
            background: #166534;
            color: #bbf7d0;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
            font-weight: 500;
            border: 1px solid #22c55e;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .header-actions a:hover {
            color: var(--red-light);
        }

        .booking-filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .panel-header {
                flex-direction: column;
                text-align: center;
            }
            .item-row {
                flex-direction: column;
                text-align: center;
            }
            #loginScreen {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="logo-icon">🔐</div>
        <h2>Matts Motor Workshop</h2>
        <p class="subtitle">Panel de Administración</p>
        <input type="password" id="adminPassword" placeholder="Contraseña" autofocus>
        <p class="error-msg" id="loginError">Contraseña incorrecta</p>
        <button onclick="login()">Ingresar al Panel</button>
        <a href="/home" class="back-link">← Volver al taller</a>
    </div>

    <div id="panelScreen">
        <div class="panel-header">
            <h1>⚙️ Administrar Contenido</h1>
            <div class="header-actions">
                <a href="/home">← Ver página</a>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
        <div class="panel-content">
            <div class="success-msg" id="successMsg">✅ Cambios guardados correctamente</div>

            <!-- Servicios -->
            <div class="admin-section">
                <h3>📋 Servicios</h3>
                <div class="item-list" id="servicesList"></div>
                <button class="btn-add" onclick="showServiceForm()">+ Nuevo Servicio</button>
                <div id="serviceForm" class="admin-form" style="display:none;">
                    <input type="text" id="serviceTitle" placeholder="Título del servicio">
                    <textarea id="serviceDesc" placeholder="Descripción del servicio"></textarea>
                    <select id="serviceIcon">
                        <option value="🔧">🔧 Mecánica</option>
                        <option value="⚡">⚡ Electricidad</option>
                        <option value="🖥️">🖥️ Scanner</option>
                        <option value="🛑">🛑 Frenos</option>
                        <option value="❄️">❄️ Aire Acond.</option>
                        <option value="🛢️">🛢️ Aceite</option>
                        <option value="🔩">🔩 General</option>
                        <option value="🚗">🚗 Motor</option>
                        <option value="💻">💻 Diagnóstico</option>
                    </select>
                    <input type="number" id="serviceOrder" placeholder="Orden de aparición (1,2,3...)" min="1" value="1">
                    <input type="hidden" id="serviceEditId">
                    <div class="form-buttons">
                        <button class="btn-add" onclick="saveService()">💾 Guardar</button>
                        <button class="btn-cancel" onclick="cancelServiceForm()">Cancelar</button>
                    </div>
                </div>
            </div>

            <!-- Galería -->
            <div class="admin-section">
                <h3>🖼️ Galería de Trabajos</h3>
                <div class="item-list" id="galleryList"></div>
                <div class="admin-form">
                    <input type="text" id="galleryUrl" placeholder="URL de la imagen">
                    <input type="text" id="galleryAlt" placeholder="Descripción breve">
                    <button class="btn-add" onclick="addGalleryItem()">+ Agregar Imagen</button>
                </div>
            </div>

            <!-- Testimonios -->
            <div class="admin-section">
                <h3>💬 Testimonios de Clientes</h3>
                <div class="item-list" id="testimonialsList"></div>
                <div class="admin-form">
                    <input type="text" id="testimonialName" placeholder="Nombre completo del cliente">
                    <input type="number" id="testimonialStars" placeholder="Calificación (1-5)" min="1" max="5" value="5">
                    <textarea id="testimonialText" placeholder="Texto del testimonio"></textarea>
                    <button class="btn-add" onclick="addTestimonial()">+ Agregar Testimonio</button>
                </div>
            </div>

            <!-- Citas -->
            <div class="admin-section">
                <h3>📅 Citas Agendadas</h3>
                <div class="booking-filters">
                    <button class="btn-admin btn-edit" onclick="filterBookings('all')" id="filterAll" style="background:var(--red);">Todas</button>
                    <button class="btn-admin btn-edit" onclick="filterBookings('pending')" id="filterPending" style="background:#f59e0b;">Pendientes</button>
                    <button class="btn-admin btn-edit" onclick="filterBookings('confirmed')" id="filterConfirmed" style="background:#3b82f6;">Confirmadas</button>
                    <button class="btn-admin btn-edit" onclick="filterBookings('in_progress')" id="filterInProgress" style="background:#8b5cf6;">En Progreso</button>
                    <button class="btn-admin btn-edit" onclick="filterBookings('completed')" id="filterCompleted" style="background:#22c55e;">Completadas</button>
                    <button class="btn-admin btn-edit" onclick="filterBookings('cancelled')" id="filterCancelled" style="background:#ef4444;">Canceladas</button>
                </div>
                <div class="item-list" id="bookingsList"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'admin123';

        const defaultServices = [
            { id: 1, title: 'Mecánica General', desc: 'Reparación completa de motor, transmisión y sistemas mecánicos con precisión experta.', icon: '🔧', order: 1 },
            { id: 2, title: 'Diagnóstico Electrónico', desc: 'Análisis computarizado avanzado para identificar fallas con exactitud milimétrica.', icon: '⚡', order: 2 },
            { id: 3, title: 'Scanner Automotriz', desc: 'Tecnología OBD-II de última generación para lecturas precisas del sistema.', icon: '🖥️', order: 3 },
            { id: 4, title: 'Frenos de Alto Rendimiento', desc: 'Sistemas de frenado inspeccionados y reparados con componentes premium.', icon: '🛑', order: 4 },
            { id: 5, title: 'Climatización', desc: 'Servicio completo de aire acondicionado con refrigerantes ecológicos.', icon: '❄️', order: 5 },
            { id: 6, title: 'Lubricación Express', desc: 'Cambio de aceite sintético y filtros originales. Servicio rápido y eficiente.', icon: '🛢️', order: 6 },
        ];

        const defaultGallery = [
            { id: 1, url: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><rect fill="%231a1a1a" width="400" height="300"/><rect fill="%23222" x="50" y="50" width="300" height="200" rx="10"/><text fill="%23dc2626" x="200" y="160" text-anchor="middle" font-size="20">Motor Repair</text></svg>', alt: 'Reparación de motor' },
            { id: 2, url: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><rect fill="%231a1a1a" width="400" height="300"/><rect fill="%23222" x="50" y="50" width="300" height="200" rx="10"/><text fill="%23dc2626" x="200" y="160" text-anchor="middle" font-size="20">Brake System</text></svg>', alt: 'Sistema de frenos' },
            { id: 3, url: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><rect fill="%231a1a1a" width="400" height="300"/><rect fill="%23222" x="50" y="50" width="300" height="200" rx="10"/><text fill="%23dc2626" x="200" y="160" text-anchor="middle" font-size="20">Diagnostics</text></svg>', alt: 'Diagnóstico computarizado' },
        ];

        const defaultTestimonials = [
            { id: 1, name: 'Carlos Mendoza', stars: 5, text: 'El nivel de profesionalismo es excepcional. Diagnosticaron el problema en minutos y la reparación fue impecable.' },
            { id: 2, name: 'Ana Gabriela R.', stars: 5, text: 'Finalmente encontré un taller donde la transparencia y la calidad van de la mano. Totalmente recomendado.' },
            { id: 3, name: 'Roberto Linares', stars: 5, text: 'La tecnología que utilizan marca la diferencia. Mi auto nunca había funcionado tan bien.' },
        ];

        function initData() {
            if (!localStorage.getItem('services')) localStorage.setItem('services', JSON.stringify(defaultServices));
            if (!localStorage.getItem('gallery')) localStorage.setItem('gallery', JSON.stringify(defaultGallery));
            if (!localStorage.getItem('testimonials')) localStorage.setItem('testimonials', JSON.stringify(defaultTestimonials));
        }

        function getServices() { return JSON.parse(localStorage.getItem('services')) || []; }
        function getGallery() { return JSON.parse(localStorage.getItem('gallery')) || []; }
        function getTestimonials() { return JSON.parse(localStorage.getItem('testimonials')) || []; }
        function getBookings() { return JSON.parse(localStorage.getItem('bookings')) || []; }

        function showSuccess() {
            const msg = document.getElementById('successMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2500);
        }

        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('panelScreen').style.display = 'block';
                document.body.style.alignItems = 'flex-start';
                renderAll();
                document.getElementById('adminPassword').value = '';
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('panelScreen').style.display = 'none';
            document.body.style.alignItems = 'center';
            document.getElementById('loginError').style.display = 'none';
        }

        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        function renderServicesList() {
            const container = document.getElementById('servicesList');
            const services = getServices().sort((a, b) => a.order - b.order);
            container.innerHTML = services.map(s => `
                <div class="item-row">
                    <span>${s.icon} <strong>${s.title}</strong> · Orden: ${s.order}</span>
                    <div>
                        <button class="btn-admin btn-edit" onclick="editService(${s.id})">Editar</button>
                        <button class="btn-admin btn-delete" onclick="deleteService(${s.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function renderGalleryList() {
            const container = document.getElementById('galleryList');
            const gallery = getGallery();
            container.innerHTML = gallery.map(g => `
                <div class="item-row">
                    <span>🖼️ ${g.alt}</span>
                    <button class="btn-admin btn-delete" onclick="deleteGalleryItem(${g.id})">Eliminar</button>
                </div>
            `).join('');
        }

        function renderTestimonialsList() {
            const container = document.getElementById('testimonialsList');
            const testimonials = getTestimonials();
            container.innerHTML = testimonials.map(t => `
                <div class="item-row">
                    <span>💬 ${t.name} · ${'★'.repeat(t.stars)}</span>
                    <button class="btn-admin btn-delete" onclick="deleteTestimonial(${t.id})">Eliminar</button>
                </div>
            `).join('');
        }

        let currentFilter = 'all';

        function renderBookings() {
            const container = document.getElementById('bookingsList');
            let bookings = getBookings();
            
            if (currentFilter !== 'all') {
                bookings = bookings.filter(b => b.status === currentFilter);
            }
            
            bookings.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            if (bookings.length === 0) {
                container.innerHTML = '<div class="item-row" style="justify-content:center; color:var(--text-muted);">No hay citas para mostrar</div>';
                return;
            }
            
            container.innerHTML = bookings.map(b => {
                const statusColors = {
                    pending: { bg: '#f59e0b', text: 'Pendiente' },
                    confirmed: { bg: '#3b82f6', text: 'Confirmada' },
                    in_progress: { bg: '#8b5cf6', text: 'En Progreso' },
                    completed: { bg: '#22c55e', text: 'Completada' },
                    cancelled: { bg: '#ef4444', text: 'Cancelada' }
                };
                const status = statusColors[b.status] || statusColors.pending;
                const date = new Date(b.date).toLocaleDateString('es-MX', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
                const notes = b.notes || [];
                
                return `
                    <div class="item-row" style="flex-direction:column; align-items:stretch; gap:0.75rem;">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                            <div>
                                <span style="font-weight:700;">📅 ${date} ${b.time || ''}</span>
                                ${b.plate ? `<span style="margin-left:1rem; background:var(--bg-dark); padding:0.2rem 0.6rem; border-radius:4px; font-family:monospace; font-weight:700; letter-spacing:1px;">🚗 ${b.plate}</span>` : '<span style="margin-left:0.5rem; color:var(--text-muted); font-size:0.8rem;">Sin placa</span>'}
                            </div>
                            <span style="background:${status.bg}; color:white; padding:0.25rem 0.75rem; border-radius:50px; font-size:0.75rem; font-weight:600;">${status.text}</span>
                        </div>
                        <div style="display:grid; gap:0.3rem; font-size:0.9rem; color:var(--text-secondary);">
                            <div>👤 <strong style="color:var(--text-primary);">${b.name}</strong></div>
                            <div>📞 ${b.phone} ${b.email ? '| ✉️ ' + b.email : ''}</div>
                            <div>🚗 ${b.vehicle} | 🔧 ${b.service}</div>
                            ${b.description ? `<div style="font-style:italic; padding:0.5rem; background:var(--bg-dark); border-radius:6px; margin-top:0.25rem;">"${b.description}"</div>` : ''}
                        </div>
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                            <div>
                                <label style="font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Placa</label>
                                <input type="text" value="${b.plate || ''}" onchange="updateBookingPlate(${b.id}, this.value)" placeholder="ABC-1234"
                                    style="width:100%; padding:0.5rem 0.8rem; background:var(--bg-dark); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-size:0.85rem; font-family:monospace; letter-spacing:1px; text-transform:uppercase; outline:none;">
                            </div>
                            <div>
                                <label style="font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Entrega Estimada</label>
                                <input type="date" value="${b.estimatedDelivery || ''}" onchange="updateBookingEstimate(${b.id}, this.value)"
                                    style="width:100%; padding:0.5rem 0.8rem; background:var(--bg-dark); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-size:0.85rem; color-scheme:dark; outline:none;">
                            </div>
                        </div>
                        
                        <div style="background:var(--bg-dark); border:1px solid var(--border); border-radius:8px; padding:1rem;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                                <span style="font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">📝 Notas del Taller</span>
                                <button class="btn-admin btn-edit" onclick="addBookingNote(${b.id})" style="font-size:0.7rem;">+ Nota</button>
                            </div>
                            ${notes.length === 0 ? '<p style="color:var(--text-muted); font-size:0.8rem; font-style:italic;">Sin notas</p>' : 
                            `<ul style="list-style:none; display:grid; gap:0.3rem;">${notes.map(n => `
                                <li style="font-size:0.8rem; color:var(--text-secondary); padding:0.4rem 0.6rem; background:var(--bg-elevated); border-radius:4px; display:flex; justify-content:space-between;">
                                    <span>${n.text}</span>
                                    <span style="color:var(--text-muted); font-size:0.7rem;">${new Date(n.time).toLocaleString('es-MX', {hour:'2-digit',minute:'2-digit'})}</span>
                                </li>
                            `).join('')}</ul>`}
                        </div>
                        
                        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
                            <select onchange="updateBookingStatus(${b.id}, this.value)" style="padding:0.4rem 0.8rem; background:var(--bg-dark); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-size:0.8rem; cursor:pointer;">
                                <option value="pending" ${b.status==='pending'?'selected':''}>Pendiente</option>
                                <option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmar</option>
                                <option value="in_progress" ${b.status==='in_progress'?'selected':''}>En Progreso</option>
                                <option value="completed" ${b.status==='completed'?'selected':''}>Completar</option>
                                <option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelar</option>
                            </select>
                            <button class="btn-admin btn-delete" onclick="deleteBooking(${b.id})">Eliminar</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateBookingPlate(id, plate) {
            const bookings = getBookings();
            const index = bookings.findIndex(b => b.id === id);
            if (index !== -1) {
                bookings[index].plate = plate.toUpperCase();
                localStorage.setItem('bookings', JSON.stringify(bookings));
            }
        }

        function updateBookingEstimate(id, date) {
            const bookings = getBookings();
            const index = bookings.findIndex(b => b.id === id);
            if (index !== -1) {
                bookings[index].estimatedDelivery = date;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                showSuccess();
            }
        }

        function addBookingNote(id) {
            const note = prompt('Agregar nota para el cliente:');
            if (note && note.trim()) {
                const bookings = getBookings();
                const index = bookings.findIndex(b => b.id === id);
                if (index !== -1) {
                    if (!bookings[index].notes) bookings[index].notes = [];
                    bookings[index].notes.push({
                        text: note.trim(),
                        time: new Date().toISOString()
                    });
                    localStorage.setItem('bookings', JSON.stringify(bookings));
                    renderBookings();
                    showSuccess();
                }
            }
        }

        function updateBookingStatus(id, status) {
            const bookings = getBookings();
            const index = bookings.findIndex(b => b.id === id);
            if (index !== -1) {
                bookings[index].status = status;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                renderBookings();
                showSuccess();
            }
        }

        function deleteBooking(id) {
            if (confirm('¿Eliminar esta cita permanentemente?')) {
                const bookings = getBookings().filter(b => b.id !== id);
                localStorage.setItem('bookings', JSON.stringify(bookings));
                renderBookings();
                showSuccess();
            }
        }

        function filterBookings(filter) {
            currentFilter = filter;
            const filters = ['all','pending','confirmed','in_progress','completed','cancelled'];
            filters.forEach(f => {
                const btn = document.getElementById('filter' + f.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(''));
                if (btn) btn.style.opacity = filter === f ? '1' : '0.5';
            });
            renderBookings();
        }

        function renderAll() {
            renderServicesList();
            renderGalleryList();
            renderTestimonialsList();
            renderBookings();
        }

        function showServiceForm() {
            document.getElementById('serviceForm').style.display = 'grid';
            document.getElementById('serviceEditId').value = '';
            document.getElementById('serviceTitle').value = '';
            document.getElementById('serviceDesc').value = '';
            document.getElementById('serviceOrder').value = '1';
            document.getElementById('serviceTitle').focus();
        }

        function cancelServiceForm() {
            document.getElementById('serviceForm').style.display = 'none';
        }

        function saveService() {
            const services = getServices();
            const editId = document.getElementById('serviceEditId').value;
            const title = document.getElementById('serviceTitle').value;
            const desc = document.getElementById('serviceDesc').value;
            const icon = document.getElementById('serviceIcon').value;
            const order = parseInt(document.getElementById('serviceOrder').value) || 1;

            if (!title || !desc) {
                alert('Complete todos los campos requeridos');
                return;
            }

            if (editId) {
                const index = services.findIndex(s => s.id === parseInt(editId));
                if (index !== -1) services[index] = { ...services[index], title, desc, icon, order };
            } else {
                const newId = services.length > 0 ? Math.max(...services.map(s => s.id)) + 1 : 1;
                services.push({ id: newId, title, desc, icon, order });
            }

            localStorage.setItem('services', JSON.stringify(services));
            cancelServiceForm();
            renderAll();
            showSuccess();
        }

        function editService(id) {
            const service = getServices().find(s => s.id === id);
            if (service) {
                document.getElementById('serviceEditId').value = service.id;
                document.getElementById('serviceTitle').value = service.title;
                document.getElementById('serviceDesc').value = service.desc;
                document.getElementById('serviceIcon').value = service.icon;
                document.getElementById('serviceOrder').value = service.order;
                document.getElementById('serviceForm').style.display = 'grid';
                document.getElementById('serviceTitle').focus();
            }
        }

        function deleteService(id) {
            if (confirm('¿Eliminar este servicio permanentemente?')) {
                const services = getServices().filter(s => s.id !== id);
                localStorage.setItem('services', JSON.stringify(services));
                renderAll();
                showSuccess();
            }
        }

        function addGalleryItem() {
            const url = document.getElementById('galleryUrl').value;
            const alt = document.getElementById('galleryAlt').value || 'Trabajo realizado';

            if (!url) {
                alert('Ingrese la URL de la imagen');
                return;
            }

            const gallery = getGallery();
            const newId = gallery.length > 0 ? Math.max(...gallery.map(g => g.id)) + 1 : 1;
            gallery.push({ id: newId, url, alt });
            localStorage.setItem('gallery', JSON.stringify(gallery));
            document.getElementById('galleryUrl').value = '';
            document.getElementById('galleryAlt').value = '';
            renderAll();
            showSuccess();
        }

        function deleteGalleryItem(id) {
            if (confirm('¿Eliminar esta imagen de la galería?')) {
                const gallery = getGallery().filter(g => g.id !== id);
                localStorage.setItem('gallery', JSON.stringify(gallery));
                renderAll();
                showSuccess();
            }
        }

        function addTestimonial() {
            const name = document.getElementById('testimonialName').value;
            const stars = parseInt(document.getElementById('testimonialStars').value) || 5;
            const text = document.getElementById('testimonialText').value;

            if (!name || !text) {
                alert('Complete todos los campos requeridos');
                return;
            }

            const testimonials = getTestimonials();
            const newId = testimonials.length > 0 ? Math.max(...testimonials.map(t => t.id)) + 1 : 1;
            testimonials.push({ id: newId, name, stars: Math.min(5, Math.max(1, stars)), text });
            localStorage.setItem('testimonials', JSON.stringify(testimonials));
            document.getElementById('testimonialName').value = '';
            document.getElementById('testimonialStars').value = '5';
            document.getElementById('testimonialText').value = '';
            renderAll();
            showSuccess();
        }

        function deleteTestimonial(id) {
            if (confirm('¿Eliminar este testimonio?')) {
                const testimonials = getTestimonials().filter(t => t.id !== id);
                localStorage.setItem('testimonials', JSON.stringify(testimonials));
                renderAll();
                showSuccess();
            }
        }

        initData();
    </script>
</body>
</html>
